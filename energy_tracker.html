<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Energy Tracker</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  :root {
    --bg: #ffffff;
    --bg2: #f7f7f5;
    --bg3: #f0efe9;
    --text: #1a1a18;
    --text2: #6b6b67;
    --text3: #9b9b96;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --radius: 8px;
    --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg2: #252523;
      --bg3: #2e2e2b;
      --text: #f0efe9;
      --text2: #a8a8a3;
      --text3: #6b6b67;
      --border: rgba(255,255,255,0.12);
      --border2: rgba(255,255,255,0.22);
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--text); font-size: 15px; min-height: 100vh; }
  .app { max-width: 720px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
  h1 { font-size: 20px; font-weight: 500; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 10px; }
  .setup-banner { background: #E6F1FB; border: 0.5px solid #B5D4F4; border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 1.25rem; font-size: 13px; color: #0C447C; line-height: 1.6; }
  .setup-banner strong { font-weight: 500; }
  .setup-banner input { width: 100%; margin-top: 8px; padding: 7px 10px; border-radius: var(--radius); border: 0.5px solid #85B7EB; font-size: 13px; background: white; color: #042C53; }
  .setup-banner button { margin-top: 8px; padding: 6px 14px; font-size: 13px; border-radius: var(--radius); border: 0.5px solid #378ADD; background: #E6F1FB; color: #185FA5; cursor: pointer; }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 1.25rem; }
  .stat { border-radius: var(--radius); padding: .7rem .85rem; cursor: pointer; transition: transform 0.1s, box-shadow 0.1s; }
  .stat:hover { transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,0.10); }
  .stat:active { transform: scale(0.97); }
  .stat.active-stat { outline: 2px solid var(--border2); outline-offset: 1px; }
  .stat-num { font-size: 22px; font-weight: 500; }
  .stat-lbl { font-size: 11px; margin-top: 2px; line-height: 1.3; }
  .s1 { background: #FCEBEB; } .s1 .stat-num { color: #A32D2D; } .s1 .stat-lbl { color: #791F1F; }
  .s2 { background: #EAF3DE; } .s2 .stat-num { color: #3B6D11; } .s2 .stat-lbl { color: #27500A; }
  .s3 { background: #F1EFE8; } .s3 .stat-num { color: #5F5E5A; } .s3 .stat-lbl { color: #444441; }
  .s4 { background: #FAEEDA; } .s4 .stat-num { color: #854F0B; } .s4 .stat-lbl { color: #633806; }
  .form-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 1.25rem; }
  .form-card input, .form-card select { width: 100%; padding: 8px 10px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text); font-size: 14px; margin-bottom: 8px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .form-row select { margin-bottom: 0; }
  .add-btn { width: 100%; padding: 9px; margin-top: 4px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .add-btn:hover { background: var(--bg3); }
  .add-btn:active { transform: scale(0.98); }
  .filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
  .fb { font-size: 12px; padding: 5px 11px; border-radius: 20px; border: 0.5px solid var(--border2); background: var(--bg); color: var(--text2); cursor: pointer; }
  .fb.active { background: var(--bg3); color: var(--text); border-color: var(--border2); font-weight: 500; }
  .section-hdr { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: .07em; color: var(--text2); margin: 1.25rem 0 .5rem; padding-bottom: 6px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; gap: 8px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .d1{background:#E24B4A;} .d2{background:#639922;} .d3{background:#888780;} .d4{background:#BA7517;}
  .item { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); border-left: 3px solid; border-top-left-radius: 0; border-bottom-left-radius: 0; padding: .8rem 1rem; margin-bottom: 7px; display: flex; align-items: flex-start; gap: 10px; }
  .acc1{border-left-color:#E24B4A;} .acc2{border-left-color:#639922;} .acc3{border-left-color:#B4B2A9;} .acc4{border-left-color:#BA7517;}
  .item.cleared { opacity: .4; }
  .chk { width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid var(--border2); background: transparent; cursor: pointer; flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #3B6D11; }
  .chk.on { background: #EAF3DE; border-color: #639922; }
  .item-body { flex: 1; min-width: 0; }
  .item-name { font-weight: 500; margin-bottom: 4px; word-break: break-word; }
  .item-name.cleared { text-decoration: line-through; }
  .item-meta { display: flex; gap: 5px; flex-wrap: wrap; }
  .badge { font-size: 11px; padding: 2px 7px; border-radius: 20px; font-weight: 500; }
  .b1{background:#FCEBEB;color:#A32D2D;} .b2{background:#EAF3DE;color:#3B6D11;}
  .b3{background:#F1EFE8;color:#5F5E5A;} .b4{background:#FAEEDA;color:#854F0B;}
  .bwork{background:#E6F1FB;color:#185FA5;} .bpersonal{background:#EEEDFE;color:#534AB7;}
  .item-note { font-size: 12px; color: var(--text2); margin-top: 4px; font-style: italic; }
  .del-btn { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 16px; padding: 2px 4px; flex-shrink: 0; }
  .del-btn:hover { color: #A32D2D; }
  .empty { text-align: center; color: var(--text2); padding: 2rem 0; font-size: 13px; }
  .sync-status { font-size: 11px; color: var(--text3); text-align: right; margin-bottom: .5rem; min-height: 16px; }
  .sync-status.error { color: #A32D2D; }
  .sync-status.ok { color: #3B6D11; }
  @media (max-width: 500px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .form-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="app">
  <h1><i class="ti ti-chart-bar"></i> Energy tracker</h1>

  <div class="setup-banner" id="setup-banner">
    <strong>One-time setup:</strong> Paste your Google Apps Script URL below to connect your Google Sheet. 
    See the setup guide included with this file.<br>
    <input type="text" id="script-url-input" placeholder="https://script.google.com/macros/s/YOUR_ID/exec" />
    <button onclick="saveScriptUrl()">Save &amp; connect</button>
  </div>

  <div class="sync-status" id="sync-status"></div>

  <div class="stats" id="stats"></div>

  <div class="form-card">
    <input type="text" id="f-name" placeholder="What's on your plate…" />
    <div class="form-row">
      <select id="f-cat">
        <option value="1">Risk / threat / distraction</option>
        <option value="2">Giving energy — want to do</option>
        <option value="3">Neutral / normal</option>
        <option value="4">Taking energy — watch it</option>
      </select>
      <select id="f-tag">
        <option value="work">Work</option>
        <option value="personal">Personal</option>
      </select>
    </div>
    <input type="text" id="f-note" placeholder="Note (optional)" />
    <button class="add-btn" onclick="addItem()"><i class="ti ti-plus"></i> Add</button>
  </div>

  <div class="filters">
    <button class="fb active" onclick="setFilter('all',this)">All</button>
    <button class="fb" onclick="setFilter('work',this)">Work</button>
    <button class="fb" onclick="setFilter('personal',this)">Personal</button>
  </div>

  <div id="list"></div>
</div>

<script>
const CATS = {
  '1': { label: 'Risk / threat / distraction', short: 'Risk', cls: 'b1', acc: 'acc1', dot: 'd1' },
  '2': { label: 'Giving energy', short: 'Energizing', cls: 'b2', acc: 'acc2', dot: 'd2' },
  '3': { label: 'Neutral / normal', short: 'Neutral', cls: 'b3', acc: 'acc3', dot: 'd3' },
  '4': { label: 'Taking energy', short: 'Draining', cls: 'b4', acc: 'acc4', dot: 'd4' }
};

const CAT_ORDER = ['1','2','3','4']; // Risk → Energizing → Neutral → Draining, always

let items = [];
let filter = 'all';      // 'all' | 'work' | 'personal' | '1'|'2'|'3'|'4'
let SCRIPT_URL = localStorage.getItem('et_script_url') || '';

if (SCRIPT_URL) {
  document.getElementById('setup-banner').style.display = 'none';
  document.getElementById('script-url-input').value = SCRIPT_URL;
  loadFromSheet();
} else {
  try { items = JSON.parse(localStorage.getItem('et_items') || '[]'); } catch(e) { items = []; }
  render();
}

function saveScriptUrl() {
  const val = document.getElementById('script-url-input').value.trim();
  if (!val.startsWith('https://script.google.com')) { alert('Please paste a valid Google Apps Script URL.'); return; }
  SCRIPT_URL = val;
  localStorage.setItem('et_script_url', SCRIPT_URL);
  document.getElementById('setup-banner').style.display = 'none';
  setStatus('Connecting…', '');
  loadFromSheet();
}

function setStatus(msg, cls) {
  const el = document.getElementById('sync-status');
  el.textContent = msg;
  el.className = 'sync-status ' + cls;
}

async function loadFromSheet() {
  if (!SCRIPT_URL) return;
  setStatus('Loading…', '');
  try {
    const res = await fetch(SCRIPT_URL + '?action=get');
    const data = await res.json();
    items = data;
    localStorage.setItem('et_items', JSON.stringify(items));
    setStatus('Synced ' + new Date().toLocaleTimeString(), 'ok');
    render();
  } catch(e) {
    try { items = JSON.parse(localStorage.getItem('et_items') || '[]'); } catch(e2) { items = []; }
    setStatus('Offline — showing cached data', 'error');
    render();
  }
}

async function syncToSheet(action, payload) {
  if (!SCRIPT_URL) {
    localStorage.setItem('et_items', JSON.stringify(items));
    return;
  }
  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action, ...payload })
    });
    setStatus('Synced ' + new Date().toLocaleTimeString(), 'ok');
  } catch(e) {
    setStatus('Sync failed — saved locally', 'error');
  }
  localStorage.setItem('et_items', JSON.stringify(items));
}

function addItem() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { document.getElementById('f-name').focus(); return; }
  const item = {
    id: Date.now(),
    name,
    cat: document.getElementById('f-cat').value,
    tag: document.getElementById('f-tag').value,
    note: document.getElementById('f-note').value.trim(),
    cleared: false,
    added: new Date().toISOString().slice(0,10)
  };
  items.unshift(item);
  document.getElementById('f-name').value = '';
  document.getElementById('f-note').value = '';
  render();
  syncToSheet('add', { item });
}

function toggle(id) {
  const it = items.find(i => i.id === id);
  if (!it) return;
  it.cleared = !it.cleared;
  render();
  syncToSheet('update', { item: it });
}

function del(id) {
  items = items.filter(i => i.id !== id);
  render();
  syncToSheet('delete', { id });
}

// Called by stat boxes — sets a category filter and clears pill active state
function setStatFilter(cat) {
  filter = cat;
  document.querySelectorAll('.fb').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.stat').forEach(s => s.classList.remove('active-stat'));
  document.getElementById('stat-' + cat).classList.add('active-stat');
  render();
}

function setFilter(f, el) {
  filter = f;
  document.querySelectorAll('.fb').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.stat').forEach(s => s.classList.remove('active-stat'));
  el.classList.add('active');
  render();
}

// Returns items to display based on current filter.
// 'all'      → everything (active + cleared), grouped by category
// 'work'     → active work items, grouped by category
// 'personal' → active personal items, grouped by category
// '1'–'4'    → that category only (active + cleared), flat list
function visible() {
  if (filter === 'all') return items;
  if (filter === 'work') return items.filter(i => i.tag === 'work' && !i.cleared);
  if (filter === 'personal') return items.filter(i => i.tag === 'personal' && !i.cleared);
  if (CAT_ORDER.includes(filter)) return items.filter(i => i.cat === filter);
  return items;
}

function render() {
  // Stats — always counts of active (non-cleared) items
  const counts = {'1':0,'2':0,'3':0,'4':0};
  items.filter(i => !i.cleared).forEach(i => counts[i.cat]++);
  document.getElementById('stats').innerHTML = CAT_ORDER.map(k => {
    const c = CATS[k];
    const isActive = filter === k;
    return `<div class="stat s${k}${isActive ? ' active-stat' : ''}" id="stat-${k}" onclick="setStatFilter('${k}')" role="button" tabindex="0" onkeydown="if(event.key==='Enter')setStatFilter('${k}')">
      <div class="stat-num">${counts[k]}</div>
      <div class="stat-lbl">${c.short}</div>
    </div>`;
  }).join('');

  const vis = visible();
  const listEl = document.getElementById('list');
  if (!vis.length) { listEl.innerHTML = '<div class="empty">Nothing here</div>'; return; }

  // Always group by category in Risk → Energizing → Neutral → Draining order
  let html = '';
  if (CAT_ORDER.includes(filter)) {
    // Single category view — flat list, no section header needed (category is obvious)
    const sorted = [...vis].sort((a, b) => (a.cleared ? 1 : 0) - (b.cleared ? 1 : 0));
    html = sorted.map(i => itemHTML(i)).join('');
  } else {
    // All / Work / Personal — group by category, enforced order
    CAT_ORDER.forEach(k => {
      const group = vis.filter(i => i.cat === k);
      if (!group.length) return;
      const c = CATS[k];
      // Within each group: active first, cleared last
      const sorted = [...group].sort((a, b) => (a.cleared ? 1 : 0) - (b.cleared ? 1 : 0));
      html += `<div class="section-hdr"><span class="dot ${c.dot}"></span>${c.label}</div>`;
      html += sorted.map(i => itemHTML(i)).join('');
    });
  }
  listEl.innerHTML = html;
}

function itemHTML(i) {
  const c = CATS[i.cat];
  return `<div class="item ${c.acc} ${i.cleared ? 'cleared' : ''}">
    <div class="chk ${i.cleared ? 'on' : ''}" onclick="toggle(${i.id})" role="checkbox" aria-checked="${i.cleared}" tabindex="0" onkeydown="if(event.key==='Enter'||event.key===' ')toggle(${i.id})">
      ${i.cleared ? '<i class="ti ti-check"></i>' : ''}
    </div>
    <div class="item-body">
      <div class="item-name ${i.cleared ? 'cleared' : ''}">${i.name}</div>
      <div class="item-meta">
        <span class="badge ${c.cls}">${c.short}</span>
        <span class="badge ${i.tag === 'work' ? 'bwork' : 'bpersonal'}">${i.tag}</span>
        ${i.added ? `<span style="font-size:11px;color:var(--text3)">${i.added}</span>` : ''}
      </div>
      ${i.note ? `<div class="item-note">${i.note}</div>` : ''}
    </div>
    <button class="del-btn" onclick="del(${i.id})" aria-label="Remove"><i class="ti ti-trash"></i></button>
  </div>`;
}

document.getElementById('f-name').addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });
</script>
</body>
</html>
