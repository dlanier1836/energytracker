// ── Pomodoro ──────────────────────────────────────────────
let pomoSecs = 15*60, pomoRunning = false, pomoInterval = null, pomoDuration = 15;

// ── Focus tracking ───────────────────────────────────────
// Sessions stored as array of {mins, duration} per day
function todayKey()    { return 'focusSessions_' + new Date().toISOString().slice(0,10); }
function getSessions() { try { return JSON.parse(localStorage.getItem(todayKey()) || '[]'); } catch(e) { return []; } }

// Called when a timer completes or is paused — records actual elapsed minutes
let sessionStartSecs = null; // tracks seconds at last session start

function startFocusSession() {
  sessionStartSecs = pomoSecs;
}
function endFocusSession() {
  if (sessionStartSecs === null) return;
  const elapsedSecs = sessionStartSecs - pomoSecs;
  const elapsed = elapsedSecs >= 30 ? Math.max(1, Math.round(elapsedSecs / 60)) : 0; // save if at least 30 seconds
  if (elapsed > 0) {
    const session = { id: Date.now(), mins: elapsed, duration: pomoDuration };
    const sessions = getSessions();
    sessions.push(session);
    localStorage.setItem(todayKey(), JSON.stringify(sessions));
    updateFocusDisplay();
    saveFocusSessionToSheet(session);
  }
  sessionStartSecs = null;
}

function resetFocusDay() {
  localStorage.removeItem(todayKey());
  localStorage.setItem('focusResetAt', Date.now().toString());
  updateFocusDisplay();
}

function updateFocusDisplay() {
  const sessions = getSessions();
  const totalMins = sessions.reduce((s, x) => s + x.mins, 0);

  // Label
  const h = Math.floor(totalMins / 60), m = totalMins % 60;
  document.getElementById('focus-total-display').textContent =
    (h > 0 ? h + 'h ' : '') + m + 'm focus today';

  // 10 boxes × 30 min = 5 hrs max — each box fills incrementally
  const BOXES = 10;
  const MINS_PER_BOX = 30;
  const boxesEl = document.getElementById('focus-boxes');
  let bhtml = '';
  for (let i = 0; i < BOXES; i++) {
    const boxStart = i * MINS_PER_BOX;
    const boxEnd   = boxStart + MINS_PER_BOX;
    if (totalMins >= boxEnd) {
      // fully filled
      bhtml += `<div class="focus-box" style="background:#3A9E6C;border-color:#3A9E6C" title="${boxEnd}min"></div>`;
    } else if (totalMins > boxStart) {
      // partially filled — show fill % as gradient
      const pct = Math.round(((totalMins - boxStart) / MINS_PER_BOX) * 100);
      bhtml += `<div class="focus-box" style="background:linear-gradient(to right,#3A9E6C ${pct}%,var(--bg3) ${pct}%);border-color:var(--border)" title="${totalMins - boxStart}/${MINS_PER_BOX}min"></div>`;
    } else {
      // empty
      bhtml += `<div class="focus-box" title="${boxEnd}min"></div>`;
    }
  }
  boxesEl.innerHTML = bhtml;
}

function setDuration(min) {
  if (pomoRunning) return;
  pomoDuration = min;
  pomoSecs = min * 60;
  document.querySelectorAll('.pomo-preset').forEach(b => b.classList.toggle('active', b.textContent.trim().startsWith(String(min))));
  updatePomoDisplay();
  updatePomoBar();
}
// Prevent accidental preset changes — lock active preset display while running
function syncPresetDisplay() {
  document.querySelectorAll('.pomo-preset').forEach(b => {
    b.classList.toggle('active', b.textContent.trim().startsWith(String(pomoDuration)));
  });
}
function pomoToggle() {
  if (pomoRunning) {
    clearInterval(pomoInterval);
    pomoRunning = false;
    endFocusSession();
    document.getElementById('pomo-start').textContent = 'Start';
    document.getElementById('pomo-status').textContent = 'Paused';
  } else {
    if (pomoSecs <= 0) pomoSecs = pomoDuration * 60;
    pomoRunning = true;
    startFocusSession();
    syncPresetDisplay();
    document.getElementById('pomo-start').textContent = 'Pause';
    document.getElementById('pomo-status').textContent = 'Running';
    pomoInterval = setInterval(() => {
      pomoSecs--;
      updatePomoDisplay();
      updatePomoBar();
      if (pomoSecs <= 0) {
        clearInterval(pomoInterval);
        pomoRunning = false;
        endFocusSession();
        document.getElementById('pomo-start').textContent = 'Start';
        document.getElementById('pomo-status').textContent = 'Done! 🎉';
      }
    }, 1000);
  }
}
function pomoReset() {
  clearInterval(pomoInterval);
  if (pomoRunning) endFocusSession(); // save any accumulated time before reset
  pomoRunning = false;
  pomoSecs = pomoDuration * 60;
  document.getElementById('pomo-start').textContent = 'Start';
  document.getElementById('pomo-status').textContent = 'Ready';
  updatePomoDisplay();
  updatePomoBar();
}
function updatePomoDisplay() {
  const m = Math.floor(pomoSecs/60), s = pomoSecs%60;
  document.getElementById('pomo-display').textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}
function updatePomoBar() {
  const pct = (pomoSecs / (pomoDuration * 60)) * 100;
  const bar = document.getElementById('pomo-bar');
  bar.style.width = pct + '%';
  bar.style.background = '#3A9E6C';
}


// ── Outreach ──────────────────────────────────────────────
let outreachItems = [];
let outreachTypeFilter = 'all';
let outreachCollapsed = false;

// Energy cycling: 0=neutral(gray) 1=risk(red) 2=energizing(green) 3=draining(amber)
// stored as cat string matching item cats: '3'=neutral,'1'=risk,'2'=enrg,'4'=drain
const O_CAT_CYCLE = ['3','1','2','4'];
const O_CAT_DOT   = { '1':'e1','2':'e2','3':'e3','4':'e4' };
const O_CAT_ACC   = { '1':'acc-risk','2':'acc-enrg','3':'acc-neut','4':'acc-drai' };
const O_PRI_BADGE = { '0':{ badge:'!!', cls:'pri-top' }, '1':{ badge:'!', cls:'pri-high' }, '2':{ badge:'', cls:'' }, '3':{ badge:'↓', cls:'pri-low' } };

function normalizeOutreach(r) {
  return {
    id:       Number(r.id),
    name:     r.name || '',
    type:     r.type || 'call',
    cat:      String(r.cat || '3'),
    pri:      String(r.pri != null && r.pri !== '' ? r.pri : '2'),
    starred:  r.starred === true || String(r.starred).toUpperCase() === 'TRUE',
    done:     r.done === true || String(r.done).toUpperCase() === 'TRUE',
    archived: r.archived === true || String(r.archived).toUpperCase() === 'TRUE',
    added:    (r.added || '').slice(0,10),
    lastPinged:   r.lastPinged   || '',
    snoozedUntil: r.snoozedUntil || '',
  };
}

async function loadOutreach() {
  if (!scriptUrl) return;
  try {
    const res = await fetch(scriptUrl + '?action=getOutreach');
    if (!res.ok) return;
    const data = await res.json();
    const arr = Array.isArray(data) ? data : (data.items || []);
    outreachItems = arr.map(normalizeOutreach).filter(o => !o.archived);
    localStorage.setItem('outreachCache', JSON.stringify(outreachItems));
    renderOutreach();
    render(); // ensure Today view picks up starred outreach on load
  } catch(e) {
    const cached = localStorage.getItem('outreachCache');
    if (cached) { outreachItems = JSON.parse(cached); renderOutreach(); }
  }
}

async function outreachPost(payload) {
  try {
    await fetch(scriptUrl, { method: 'POST', body: JSON.stringify(payload) });
    localStorage.setItem('outreachCache', JSON.stringify(outreachItems));
  } catch(e) {
    localStorage.setItem('outreachCache', JSON.stringify(outreachItems));
  }
}

function toggleOutreach() {
  outreachCollapsed = !outreachCollapsed;
  document.getElementById('outreach-panel').classList.toggle('collapsed', outreachCollapsed);
}

function setOutreachType(t) {
  outreachTypeFilter = t;
  document.querySelectorAll('.outreach-type-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('otype-' + t).classList.add('active');
  renderOutreach();
}

async function addOutreach() {
  const raw = document.getElementById('o-name').value.trim();
  if (!raw) return;
  const type = document.getElementById('o-type').value;
  const names = raw.split(/[,\u000a]+/).map(s => s.trim()).filter(Boolean);
  for (const name of names) {
    const item = { id: Date.now() + Math.random(), name, type, cat:'3', pri:'2', starred:false, done:false, archived:false, added: new Date().toISOString().slice(0,10) };
    item.id = Math.floor(item.id);
    outreachItems.unshift(item);
    await outreachPost({ action: 'addOutreach', item });
  }
  document.getElementById('o-name').value = '';
  renderOutreach();
}

async function toggleOutreachDone(id, e) {
  e.stopPropagation();
  const o = outreachItems.find(x => x.id === id);
  if (!o) return;
  o.done = !o.done;
  renderOutreach();
  await outreachPost({ action: 'updateOutreach', item: o });
}

async function cycleOutreachCat(id, e) {
  e.stopPropagation();
  const o = outreachItems.find(x => x.id === id);
  if (!o) return;
  const idx = O_CAT_CYCLE.indexOf(o.cat);
  o.cat = O_CAT_CYCLE[(idx + 1) % O_CAT_CYCLE.length];
  renderOutreach();
  await outreachPost({ action: 'updateOutreach', item: o });
}

async function toggleOutreachStar(id, e) {
  e.stopPropagation();
  const o = outreachItems.find(x => x.id === id);
  if (!o) return;
  o.starred = !o.starred;
  renderOutreach();
  await outreachPost({ action: 'updateOutreach', item: o });
}

async function cycleOutreachType(id, e) {
  e.stopPropagation();
  const o = outreachItems.find(x => x.id === id);
  if (!o) return;
  const cycle = ['call','email','linkedin'];
  const idx = cycle.indexOf(o.type);
  o.type = cycle[(idx + 1) % cycle.length];
  renderOutreach();
  await outreachPost({ action: 'updateOutreach', item: o });
}

async function changeOutreachPri(id, dir, e) {
  e.stopPropagation();
  const o = outreachItems.find(x => x.id === id);
  if (!o) return;
  const cur = parseInt(o.pri || '2');
  o.pri = dir === 'up' ? String(Math.max(0, cur-1)) : String(Math.min(3, cur+1));
  renderOutreach();
  await outreachPost({ action: 'updateOutreach', item: o });
}

async function pingOutreach(id, e) {
  e.stopPropagation();
  const o = outreachItems.find(x => x.id === id);
  if (!o) return;
  const btn = e.target.closest('.ping-btn');
  if (!btn) return;

  // Show "Just now" + "Pick date" options
  const wrap = document.createElement('span');
  wrap.style.cssText = 'display:inline-flex;gap:4px;align-items:center';
  const nowBtn = document.createElement('button');
  nowBtn.className = 'ping-btn';
  nowBtn.style.cssText = 'background:#3A9E6C;color:#fff;border-color:#3A9E6C';
  nowBtn.textContent = '✓ Just now';
  const dateBtn = document.createElement('button');
  dateBtn.className = 'ping-btn';
  dateBtn.textContent = 'Pick date';
  wrap.appendChild(nowBtn);
  wrap.appendChild(dateBtn);
  btn.replaceWith(wrap);

  // Just now
  nowBtn.addEventListener('click', async function(ev) {
    ev.stopPropagation();
    o.lastPinged = new Date().toISOString();
    await outreachPost({ action: 'updateOutreach', item: o });
    renderOutreach();
  });

  // Pick date — replace with datetime input
  dateBtn.addEventListener('click', function(ev) {
    ev.stopPropagation();
    const now = new Date();
    const localNow = new Date(now.getTime() - now.getTimezoneOffset()*60000).toISOString().slice(0,16);
    const input = document.createElement('input');
    input.type = 'datetime-local';
    input.className = 'ping-date-input';
    input.style.width = '160px';
    input.value = localNow;
    input.max = localNow;
    wrap.replaceWith(input);
    input.focus();
    async function confirmPing() {
      const val = input.value;
      if (val) {
        o.lastPinged = new Date(val).toISOString();
        await outreachPost({ action: 'updateOutreach', item: o });
      }
      renderOutreach();
    }
    input.addEventListener('change', confirmPing);
    input.addEventListener('blur', () => { renderOutreach(); });
    input.addEventListener('keydown', ev2 => {
      if (ev2.key === 'Enter') { ev2.preventDefault(); confirmPing(); }
      if (ev2.key === 'Escape') { renderOutreach(); }
      ev2.stopPropagation();
    });
  });
}

async function setPingDate(id, e) {
  e.stopPropagation();
  // Tap the "Xd ago" label to edit the date too
  const o = outreachItems.find(x => x.id === id);
  if (!o) return;
  const span = e.target.closest('.ping-ago');
  if (!span) return;
  const now2 = new Date();
  const localNow2 = new Date(now2.getTime() - now2.getTimezoneOffset()*60000).toISOString().slice(0,16);
  const current = o.lastPinged
    ? new Date(new Date(o.lastPinged).getTime() - now2.getTimezoneOffset()*60000).toISOString().slice(0,16)
    : localNow2;
  const input = document.createElement('input');
  input.type = 'datetime-local';
  input.className = 'ping-date-input';
  input.style.width = '160px';
  input.value = current;
  input.max = localNow2;
  span.replaceWith(input);
  input.focus();

  async function confirmPing() {
    const val = input.value;
    if (val) {
      o.lastPinged = new Date(val).toISOString();
      await outreachPost({ action: 'updateOutreach', item: o });
    }
    renderOutreach();
  }
  input.addEventListener('change', confirmPing);
  input.addEventListener('blur', () => { renderOutreach(); });
  input.addEventListener('keydown', ev => {
    if (ev.key === 'Enter') { ev.preventDefault(); confirmPing(); }
    if (ev.key === 'Escape') { renderOutreach(); }
    ev.stopPropagation();
  });
}

function formatPingAgo(ts) {
  if (!ts) return '';
  const diff = Date.now() - new Date(ts).getTime();
  const mins  = Math.floor(diff / 60000);
  const hours = Math.floor(diff / 3600000);
  const days  = Math.floor(diff / 86400000);
  if (mins < 1)   return 'just now';
  if (mins < 60)  return mins + 'm ago';
  if (hours < 24) return hours + 'h ago';
  return days + 'd ago';
}

async function deleteOutreach(id, e) {
  e.stopPropagation();
  outreachItems = outreachItems.filter(x => x.id !== id);
  renderOutreach();
  await outreachPost({ action: 'deleteOutreach', id });
}

async function archiveOutreach() {
  const toArchive = outreachItems.filter(o => o.done);
  toArchive.forEach(o => { o.archived = true; });
  outreachItems = outreachItems.filter(o => !o.done);
  renderOutreach();
  for (const o of toArchive) {
    await outreachPost({ action: 'updateOutreach', item: o });
  }
}

async function snoozeOutreach(id, e) {
  e.stopPropagation();
  const o = outreachItems.find(x => x.id === id);
  if (!o) return;
  const btn = e.target.closest('.snooze-btn');
  if (!btn) return;

  // If already snoozed, clear it
  if (o.snoozedUntil && new Date(o.snoozedUntil) > new Date()) {
    o.snoozedUntil = '';
    await outreachPost({ action: 'updateOutreach', item: o });
    renderOutreach();
    return;
  }

  // Show date picker
  const today = new Date().toISOString().slice(0,10);
  const input = document.createElement('input');
  input.type = 'date';
  input.className = 'ping-date-input';
  input.style.width = '120px';
  input.min = today;
  btn.replaceWith(input);
  input.focus();

  async function confirmSnooze() {
    const val = input.value;
    if (val) {
      o.snoozedUntil = val;
      await outreachPost({ action: 'updateOutreach', item: o });
    }
    renderOutreach();
  }
  input.addEventListener('change', confirmSnooze);
  input.addEventListener('blur', () => { renderOutreach(); });
  input.addEventListener('keydown', ev => {
    if (ev.key === 'Enter') { ev.preventDefault(); confirmSnooze(); }
    if (ev.key === 'Escape') { renderOutreach(); }
    ev.stopPropagation();
  });
}

function editOutreachName(id, e) {
  e.stopPropagation();
  const o = outreachItems.find(x => x.id === id);
  if (!o || o.done) return;
  const span = document.getElementById('oname-' + id);
  if (!span) return;
  const input = document.createElement('input');
  input.className = 'outreach-name-input';
  input.value = o.name;
  span.replaceWith(input);
  input.focus();
  input.select();
  async function save() {
    const val = input.value.trim();
    if (val) o.name = val;
    renderOutreach();
    if (val) await outreachPost({ action: 'updateOutreach', item: o });
  }
  input.addEventListener('blur', save);
  input.addEventListener('keydown', function(ev) {
    if (ev.key === 'Enter') { ev.preventDefault(); input.blur(); }
    if (ev.key === 'Escape') { o.name = o.name; renderOutreach(); }
    ev.stopPropagation();
  });
}

function renderOutreach() {
  const active = outreachItems.filter(o => !o.done);
  const done   = outreachItems.filter(o => o.done);
  // In Today view, only show starred outreach in the panel
  const todayActive = activePills.has('starred');
  const nowTs = new Date();
  const vis = outreachItems.filter(o => {
    if (todayActive && !o.done && !o.starred) return false;
    if (outreachTypeFilter !== 'all' && o.type !== outreachTypeFilter) return false;
    // Hide snoozed contacts (unless searching)
    if (o.snoozedUntil && !searchQuery && new Date(o.snoozedUntil) > nowTs) return false;
    // Search filter
    if (searchQuery && !o.name.toLowerCase().includes(searchQuery)) return false;
    return true;
  });

  // Count badge — always show full active count, not filtered
  const activeCount = active.filter(o => outreachTypeFilter === 'all' || o.type === outreachTypeFilter).length;
  document.getElementById('outreach-count').textContent = activeCount + ' remaining';

  // Done footer
  const doneCount = done.filter(o => outreachTypeFilter === 'all' || o.type === outreachTypeFilter).length;
  document.getElementById('outreach-done-count').textContent = doneCount > 0 ? doneCount + ' done today' : '';
  document.getElementById('outreach-archive-btn').style.display = done.length > 0 ? 'inline-block' : 'none';

  // Sort: starred first, then by pri, then active before done
  const sorted = [...vis].sort((a, b) => {
    if (a.done !== b.done) return a.done ? 1 : -1;
    if (a.starred !== b.starred) return a.starred ? -1 : 1;
    return parseInt(a.pri||'2') - parseInt(b.pri||'2');
  });

  if (!sorted.length) {
    document.getElementById('outreach-list').innerHTML = '<div class="outreach-empty">No outreach yet — add names above</div>';
    return;
  }

  document.getElementById('outreach-list').innerHTML = sorted.map(o => {
    const pri = o.pri || '2';
    const pb  = O_PRI_BADGE[pri];
    const priBadge = pb && pb.badge ? `<span class="outreach-pri-badge ${pb.cls}">${pb.badge}</span>` : '';
    const upActive   = parseInt(pri) < 2 ? 'active' : '';
    const downActive = parseInt(pri) > 2 ? 'active' : '';
    const dotCls = O_CAT_DOT[o.cat] || 'e3';
    const typeIcon = o.type === 'email' ? 'ti-mail' : o.type === 'linkedin' ? 'ti-brand-linkedin' : 'ti-phone';
    const typeTitle = o.type === 'email' ? 'Email' : o.type === 'linkedin' ? 'LinkedIn' : 'Call';
    return `<div class="outreach-row">
      <div class="outreach-chk ${o.done ? 'done' : ''}" onclick="toggleOutreachDone(${o.id}, event)">
        ${o.done ? '<i class="ti ti-check"></i>' : ''}
      </div>
      <div class="e-dot ${dotCls}" onclick="cycleOutreachCat(${o.id}, event)" title="Tap to set energy type"></div>
      <i class="ti ${typeIcon} outreach-icon" onclick="cycleOutreachType(${o.id}, event)" style="cursor:pointer" title="Tap to change type (${typeTitle})" aria-hidden="true"></i>
      <div class="outreach-name-wrap" style="flex:1;min-width:0">
        <span class="outreach-name ${o.done ? 'done' : ''}" id="oname-${o.id}" onclick="editOutreachName(${o.id}, event)" title="Tap to edit">${o.name}</span>
        ${o.lastPinged ? `<span class="ping-ago" onclick="setPingDate(${o.id}, event)" title="Tap to change date" style="display:block;margin-top:1px">${formatPingAgo(o.lastPinged)}</span>` : ''}
        ${o.snoozedUntil && new Date(o.snoozedUntil) > new Date() ? `<span style="font-size:11px;color:#185FA5;display:block;margin-top:1px">💤 until ${new Date(o.snoozedUntil).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>` : ''}
      </div>
      <button class="ping-btn" onclick="pingOutreach(${o.id}, event)" title="Log a ping">ping</button>
      <button class="snooze-btn" onclick="snoozeOutreach(${o.id}, event)" title="Snooze contact">💤</button>
      ${priBadge}
      <button class="outreach-star ${o.starred ? 'on' : ''}" onclick="toggleOutreachStar(${o.id}, event)" title="Star for today">★</button>
      <div class="outreach-pri-btns">
        <button class="outreach-pri-btn ${upActive}"   onclick="changeOutreachPri(${o.id},'up',event)">▲</button>
        <button class="outreach-pri-btn ${downActive}" onclick="changeOutreachPri(${o.id},'down',event)">▼</button>
      </div>
      <button class="outreach-del" onclick="deleteOutreach(${o.id}, event)" aria-label="Remove"><i class="ti ti-x"></i></button>
    </div>`;
  }).join('');

  // Also re-render task list so Today filter picks up outreach stars
  // (only if we're in starred/prioritized view)
  if (activePills.has('starred') || activePills.has('prioritized')) render();
}

// Return outreach items visible in current task filter (for Today / Prioritized views)
function visibleOutreach() {
  const star = activePills.has('starred');
  const pri  = activePills.has('prioritized');
  if (!star && !pri && !catFilter) return [];
  return outreachItems.filter(o => {
    if (o.done) return false;
    if (catFilter && o.cat !== catFilter) return false;
    // In Today view, only show starred outreach
    if (star && !o.starred) return false;
    // In Prioritized view, only show high/top priority outreach
    if (pri && !star && parseInt(o.pri||'2') >= 2) return false;
    return true;
  });
}

function outreachItemHTML(o) {
  const pri = o.pri || '2';
  const pb  = O_PRI_BADGE[pri];
  const priBadge = pb && pb.badge ? `<span class="pri-badge ${pb.cls}">${pb.badge}</span>` : '';
  const dotCls = O_CAT_DOT[o.cat] || 'e3';
  const accCls = O_CAT_ACC[o.cat] || 'acc-neut';
  const typeIcon = o.type === 'email' ? 'ti-mail' : o.type === 'linkedin' ? 'ti-brand-linkedin' : 'ti-phone';
  return `<div class="item ${accCls} ${o.starred ? 'starred-item' : ''}">
    <div class="item-row" style="cursor:default">
      <div class="outreach-chk ${o.done ? 'done' : ''}" onclick="toggleOutreachDone(${o.id}, event)">
        ${o.done ? '<i class="ti ti-check"></i>' : ''}
      </div>
      <div class="item-body">
        <div class="item-name" style="display:flex;align-items:center;gap:6px">
          <i class="ti ${typeIcon}" style="font-size:13px;color:var(--text2)" aria-hidden="true"></i>
          ${o.name}
        </div>
        <div class="item-meta">
          <span class="badge bwork" style="text-transform:none;letter-spacing:0">Contact</span>
          ${priBadge}
        </div>
      </div>
      <button class="outreach-star ${o.starred ? 'on' : ''}" onclick="toggleOutreachStar(${o.id}, event)" title="Star for today" style="font-size:18px;padding:2px 4px;background:none;border:none;cursor:pointer;color:${o.starred ? '#f59e0b' : 'var(--border2)'}">★</button>
    </div>
  </div>`;
}


// ── Risks in Remission ────────────────────────────────────
let remissionCollapsed = true;

async function sendToRemission(id, e) {
  e.stopPropagation();
  const item = items.find(i => i.id === id);
  if (!item) return;
  item.remission = true;
  if (expandedId === id) expandedId = null;
  render();
  renderRemission();
  await apiPost({ action: 'update', item });
}

async function restoreFromRemission(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  item.remission = false;
  render();
  renderRemission();
  await apiPost({ action: 'update', item });
}

function toggleRemission() {
  remissionCollapsed = !remissionCollapsed;
  const p = document.getElementById('remission-panel-inline') || document.getElementById('remission-panel');
  if (p) p.classList.toggle('collapsed', remissionCollapsed);
}

function remissionPanelHTML() {
  const inRemission = items.filter(i => i.remission && !i.archived);
  if (!inRemission.length || offClock) return '';
  const isCollapsed = remissionCollapsed;
  // Render full item cards so they're interactive
  const rows = inRemission.map(i => itemHTML(i)).join('');
  return `<div class="remission-panel ${isCollapsed ? 'collapsed' : ''}" id="remission-panel-inline">
    <div class="remission-hdr" onclick="toggleRemission()">
      <div class="remission-hdr-title">
        <i class="ti ti-shield-check" style="font-size:14px" aria-hidden="true"></i>
        Risks in Remission
        <span class="remission-count">${inRemission.length}</span>
      </div>
      <i class="ti ti-chevron-down remission-chevron" aria-hidden="true"></i>
    </div>
    <div class="remission-body" style="padding:6px 8px 8px">${rows}</div>
  </div>`;
}

function renderRemission() {
  // Replace anchor in list if present
  const anchor = document.getElementById('remission-inline-anchor');
  if (anchor) {
    anchor.outerHTML = remissionPanelHTML();
    return;
  }
  // Hide the standalone panel since it's now inline
  const panel = document.getElementById('remission-panel');
  if (panel) panel.style.display = 'none';
}

// ── Errands ──────────────────────────────────────────────
let errandsItems = [];
let errandsCollapsed = false;

function normalizeErrand(r) {
  return {
    id:       Number(r.id),
    name:     r.name || '',
    pri:      String(r.pri != null && r.pri !== '' ? r.pri : '2'),
    starred:  r.starred === true || String(r.starred).toUpperCase() === 'TRUE',
    done:     r.done    === true || String(r.done).toUpperCase()    === 'TRUE',
    archived: r.archived === true || String(r.archived).toUpperCase() === 'TRUE',
    added:    (r.added || '').slice(0,10),
  };
}

async function loadErrands() {
  if (!scriptUrl) return;
  try {
    const res = await fetch(scriptUrl + '?action=getErrands');
    if (!res.ok) return;
    const data = await res.json();
    const arr = Array.isArray(data) ? data : (data.items || []);
    errandsItems = arr.map(normalizeErrand).filter(e => !e.archived);
    localStorage.setItem('errandsCache', JSON.stringify(errandsItems));
    renderErrands();
  } catch(err) {
    const cached = localStorage.getItem('errandsCache');
    if (cached) { errandsItems = JSON.parse(cached); renderErrands(); }
  }
}

async function errandsPost(payload) {
  try {
    await fetch(scriptUrl, { method: 'POST', body: JSON.stringify(payload) });
    localStorage.setItem('errandsCache', JSON.stringify(errandsItems));
  } catch(e) {
    localStorage.setItem('errandsCache', JSON.stringify(errandsItems));
  }
}

function toggleErrands() {
  errandsCollapsed = !errandsCollapsed;
  document.getElementById('errands-panel').classList.toggle('collapsed', errandsCollapsed);
}

async function addErrands() {
  const raw = document.getElementById('e-name').value.trim();
  if (!raw) return;
  const names = raw.split(/[,\u000a]+/).map(s => s.trim()).filter(Boolean);
  for (const name of names) {
    const item = { id: Math.floor(Date.now() + Math.random()*1000), name, pri:'2', starred:false, done:false, archived:false, added: new Date().toISOString().slice(0,10) };
    errandsItems.unshift(item);
    await errandsPost({ action: 'addErrand', item });
  }
  document.getElementById('e-name').value = '';
  renderErrands();
}

async function toggleErrandDone(id, e) {
  e.stopPropagation();
  const o = errandsItems.find(x => x.id === id);
  if (!o) return;
  o.done = !o.done;
  renderErrands();
  await errandsPost({ action: 'updateErrand', item: o });
}

async function toggleErrandStar(id, e) {
  e.stopPropagation();
  const o = errandsItems.find(x => x.id === id);
  if (!o) return;
  o.starred = !o.starred;
  renderErrands();
  await errandsPost({ action: 'updateErrand', item: o });
}

async function changeErrandPri(id, dir, e) {
  e.stopPropagation();
  const o = errandsItems.find(x => x.id === id);
  if (!o) return;
  const cur = parseInt(o.pri || '2');
  o.pri = dir === 'up' ? String(Math.max(0, cur-1)) : String(Math.min(3, cur+1));
  renderErrands();
  await errandsPost({ action: 'updateErrand', item: o });
}

async function deleteErrand(id, e) {
  e.stopPropagation();
  errandsItems = errandsItems.filter(x => x.id !== id);
  renderErrands();
  await errandsPost({ action: 'deleteErrand', id });
}

async function archiveErrands() {
  const toArchive = errandsItems.filter(o => o.done);
  toArchive.forEach(o => { o.archived = true; });
  errandsItems = errandsItems.filter(o => !o.done);
  renderErrands();
  for (const o of toArchive) await errandsPost({ action: 'updateErrand', item: o });
}

function editErrandName(id, e) {
  e.stopPropagation();
  const o = errandsItems.find(x => x.id === id);
  if (!o || o.done) return;
  const span = document.getElementById('ename-' + id);
  if (!span) return;
  const input = document.createElement('input');
  input.className = 'errands-name-input';
  input.value = o.name;
  span.replaceWith(input);
  input.focus(); input.select();
  async function save() {
    const val = input.value.trim();
    if (val) o.name = val;
    renderErrands();
    if (val) await errandsPost({ action: 'updateErrand', item: o });
  }
  input.addEventListener('blur', save);
  input.addEventListener('keydown', function(ev) {
    if (ev.key === 'Enter') { ev.preventDefault(); input.blur(); }
    if (ev.key === 'Escape') { renderErrands(); }
    ev.stopPropagation();
  });
}

function renderErrands() {
  if (!offClock) return;
  const active = errandsItems.filter(o => !o.done);
  const done   = errandsItems.filter(o => o.done);

  document.getElementById('errands-count').textContent = active.length + ' remaining';
  document.getElementById('errands-done-count').textContent = done.length > 0 ? done.length + ' done today' : '';
  document.getElementById('errands-archive-btn').style.display = done.length > 0 ? 'inline-block' : 'none';

  const sorted = [...errandsItems].sort((a,b) => {
    if (a.done !== b.done) return a.done ? 1 : -1;
    if (a.starred !== b.starred) return a.starred ? -1 : 1;
    return parseInt(a.pri||'2') - parseInt(b.pri||'2');
  });

  if (!sorted.length) {
    document.getElementById('errands-list').innerHTML = '<div class="errands-empty">No errands yet — add above</div>';
    return;
  }

  document.getElementById('errands-list').innerHTML = sorted.map(o => {
    const pri = o.pri || '2';
    const pb  = O_PRI_BADGE[pri];
    const priBadge = pb && pb.badge ? `<span class="outreach-pri-badge ${pb.cls}">${pb.badge}</span>` : '';
    const upActive   = parseInt(pri) < 2 ? 'active' : '';
    const downActive = parseInt(pri) > 2 ? 'active' : '';
    return `<div class="errands-row">
      <div class="errands-chk ${o.done ? 'done' : ''}" onclick="toggleErrandDone(${o.id}, event)">
        ${o.done ? '<i class="ti ti-check"></i>' : ''}
      </div>
      <span class="errands-name ${o.done ? 'done' : ''}" id="ename-${o.id}" onclick="editErrandName(${o.id}, event)">${o.name}</span>
      ${priBadge}
      <button class="errands-star ${o.starred ? 'on' : ''}" onclick="toggleErrandStar(${o.id}, event)" title="Star for today">★</button>
      <div class="errands-pri-btns">
        <button class="errands-pri-btn ${upActive}"   onclick="changeErrandPri(${o.id},'up',event)">▲</button>
        <button class="errands-pri-btn ${downActive}" onclick="changeErrandPri(${o.id},'down',event)">▼</button>
      </div>
      <button class="errands-del" onclick="deleteErrand(${o.id}, event)" aria-label="Remove"><i class="ti ti-x"></i></button>
    </div>`;
  }).join('');
}

// ── Subtask actions ───────────────────────────────────────
function addSubtasks(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  const input = document.getElementById('subtask-input-' + id);
  if (!input) return;
  const raw = input.value.trim();
  if (!raw) return;
  const names = raw.split(/[,\u000a]+/).map(s => s.trim()).filter(Boolean);
  if (!item.subtasks) item.subtasks = [];
  names.forEach(name => {
    item.subtasks.push({ id: Math.floor(Date.now() + Math.random()*1000), name, done: false });
  });
  input.value = '';
  expandedId = id;
  render();
  apiPost({ action: 'update', item });
}

function toggleSubtask(itemId, subId) {
  const item = items.find(i => i.id === itemId);
  if (!item) return;
  const sub = item.subtasks.find(s => s.id === subId);
  if (!sub) return;
  sub.done = !sub.done;
  item.subtasks.sort((a,b) => (a.done ? 1 : 0) - (b.done ? 1 : 0));
  expandedId = itemId;
  render();
  apiPost({ action: 'update', item });
}

function deleteSubtask(itemId, subId) {
  const item = items.find(i => i.id === itemId);
  if (!item) return;
  item.subtasks = item.subtasks.filter(s => s.id !== subId);
  expandedId = itemId;
  render();
  apiPost({ action: 'update', item });
}

function moveSubtask(itemId, subId, dir) {
  const item = items.find(i => i.id === itemId);
  if (!item) return;
  const idx = item.subtasks.findIndex(s => s.id === subId);
  if (idx === -1) return;
  const newIdx = dir === 'up' ? idx - 1 : idx + 1;
  if (newIdx < 0 || newIdx >= item.subtasks.length) return;
  const tmp = item.subtasks[idx];
  item.subtasks[idx] = item.subtasks[newIdx];
  item.subtasks[newIdx] = tmp;
  expandedId = itemId;
  render();
  apiPost({ action: 'update', item });
}

// ── Snooze ────────────────────────────────────────────────
async function clearSnooze(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  item.snoozedUntil = '';
  expandedId = id;
  render();
  await apiPost({ action: 'update', item });
}

// ── Time estimates ────────────────────────────────────────
async function setEstimate(id, val) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  item.estimate = parseInt(val) || 0;
  updateLoadCounter();
  await apiPost({ action: 'update', item });
}

function updateLoadCounter() {
  const starred = items.filter(i => i.starred && !i.cleared);
  const totalMins = starred.reduce((s, i) => s + (i.estimate || 30), 0);
  const el = document.getElementById('load-counter');
  if (!el) return;
  if (totalMins === 0) { el.style.display = 'none'; return; }
  const h = Math.floor(totalMins / 60), m = totalMins % 60;
  const label = (h > 0 ? h + 'h ' : '') + (m > 0 ? m + 'm' : '');
  el.textContent = '⏱ ' + label;
  el.style.display = 'flex';
  el.className = 'load-counter' + (totalMins > 360 ? ' heavy' : totalMins > 240 ? ' warn' : '');
}

// ── Schedule to calendar ──────────────────────────────────
function scheduleTask(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  const now = new Date();
  now.setMinutes(0, 0, 0);
  now.setHours(now.getHours() + 1);
  const pad = n => String(n).padStart(2,'0');
  const fmt = d => d.getFullYear() + pad(d.getMonth()+1) + pad(d.getDate()) + 'T' + pad(d.getHours()) + pad(d.getMinutes()) + '00';
  const end = new Date(now.getTime() + 60*60*1000);
  const url = `https://calendar.google.com/calendar/r/eventedit?text=${encodeURIComponent(item.name)}&dates=${fmt(now)}/${fmt(end)}`;
  window.open(url, '_blank');
}

// ── Focus time sync ────────────────────────────────────────
async function saveFocusSessionToSheet(session) {
  if (!scriptUrl) return;
  try {
    await fetch(scriptUrl, { method: 'POST', body: JSON.stringify({ action: 'addFocusSession', session }) });
  } catch(e) { /* silent fail — local still saved */ }
}

async function loadFocusFromSheet() {
  if (!scriptUrl) return;
  try {
    const res = await fetch(scriptUrl + '?action=getFocusSessions');
    if (!res.ok) return;
    const data = await res.json();
    const arr = Array.isArray(data) ? data : [];
    if (!arr.length) return;
    // Filter out sessions saved before last reset
    const resetAt = parseInt(localStorage.getItem('focusResetAt') || '0');
    const filtered = arr.filter(s => Number(s.id) > resetAt);
    if (!filtered.length) return;
    const sheetMins = filtered.reduce((s, x) => s + Number(x.mins || 0), 0);
    const local = getSessions();
    const localMins = local.reduce((s, x) => s + Number(x.mins || 0), 0);
    if (sheetMins > localMins) {
      const normalized = filtered.map(s => ({ id: Number(s.id), mins: Number(s.mins), duration: Number(s.duration) }));
      localStorage.setItem(todayKey(), JSON.stringify(normalized));
      updateFocusDisplay();
    }
  } catch(e) { /* use local */ }
}

// ── Init ──────────────────────────────────────────────────
document.getElementById('f-name').addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });
document.getElementById('o-name').addEventListener('keydown', e => { if (e.key === 'Enter') addOutreach(); });
document.getElementById('e-name').addEventListener('keydown', e => { if (e.key === 'Enter') addErrands(); });
updateFocusDisplay();
// re-render focus bar after layout settles so widths are correct
setTimeout(updateFocusDisplay, 100);
applyClockMode();
loadItems();
loadOutreach();
loadErrands();
loadFocusFromSheet();
renderRemission();
</script>
