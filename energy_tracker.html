<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Energy Tracker</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  :root {
    --bg: #ffffff;
    --bg2: #f7f7f5;
    --bg3: #f0efe9;
    --text: #1a1a18;
    --text2: #6b6b67;
    --text3: #9b9b96;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --radius: 8px;
    --radius-lg: 12px;
  }

  /* Manual dark — beats everything */
  html.dark {
    --bg: #1c1c1a;
    --bg2: #252523;
    --bg3: #2e2e2b;
    --text: #f0efe9;
    --text2: #a8a8a3;
    --text3: #6b6b67;
    --border: rgba(255,255,255,0.12);
    --border2: rgba(255,255,255,0.22);
  }
  /* Manual light — explicitly beats system dark preference */
  html.light {
    --bg: #ffffff !important;
    --bg2: #f7f7f5 !important;
    --bg3: #f0efe9 !important;
    --text: #1a1a18 !important;
    --text2: #6b6b67 !important;
    --text3: #9b9b96 !important;
    --border: rgba(0,0,0,0.12) !important;
    --border2: rgba(0,0,0,0.22) !important;
  }
  /* System dark mode only applies when no manual preference is set */
  @media (prefers-color-scheme: dark) {
    html:not(.light):not(.dark) {
      --bg: #1c1c1a;
      --bg2: #252523;
      --bg3: #2e2e2b;
      --text: #f0efe9;
      --text2: #a8a8a3;
      --text3: #6b6b67;
      --border: rgba(255,255,255,0.12);
      --border2: rgba(255,255,255,0.22);
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--text); font-size: 15px; min-height: 100vh; }
  .app { max-width: 720px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }

  /* Header */
  h1 { font-size: 20px; font-weight: 500; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 10px; }
  .h1-right { margin-left: auto; }
  .theme-btn { background: none; border: none; cursor: pointer; color: var(--text2); font-size: 20px; padding: 2px 4px; border-radius: 6px; display: flex; align-items: center; }
  .theme-btn:hover { color: var(--text); background: var(--bg2); }

  /* Setup banner */
  .setup-banner { background: #E6F1FB; border: 0.5px solid #B5D4F4; border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 1.25rem; font-size: 13px; color: #0C447C; line-height: 1.6; }
  .setup-banner strong { font-weight: 500; }
  .setup-banner input { width: 100%; margin-top: 8px; padding: 7px 10px; border-radius: var(--radius); border: 0.5px solid #85B7EB; font-size: 13px; background: white; color: #042C53; }
  .setup-banner button { margin-top: 8px; padding: 6px 14px; font-size: 13px; border-radius: var(--radius); border: 0.5px solid #378ADD; background: #E6F1FB; color: #185FA5; cursor: pointer; }

  /* Stats */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 1.25rem; }
  .stat { border-radius: var(--radius); padding: .7rem .85rem; cursor: pointer; transition: transform 0.1s, box-shadow 0.1s; }
  .stat:hover { transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,0.10); }
  .stat:active { transform: scale(0.97); }
  .stat.active-stat { outline: 2px solid var(--border2); outline-offset: 1px; }
  .stat-num { font-size: 22px; font-weight: 500; }
  .stat-lbl { font-size: 11px; margin-top: 2px; line-height: 1.3; }
  .s1 { background: #FCEBEB; } .s1 .stat-num { color: #A32D2D; } .s1 .stat-lbl { color: #791F1F; }
  .s2 { background: #EAF3DE; } .s2 .stat-num { color: #3B6D11; } .s2 .stat-lbl { color: #27500A; }
  .s3 { background: #F1EFE8; } .s3 .stat-num { color: #5F5E5A; } .s3 .stat-lbl { color: #444441; }
  .s4 { background: #FAEEDA; } .s4 .stat-num { color: #854F0B; } .s4 .stat-lbl { color: #633806; }

  /* Add form */
  .form-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 1.25rem; }
  .form-card input, .form-card select { width: 100%; padding: 8px 10px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text); font-size: 14px; margin-bottom: 8px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .form-row select { margin-bottom: 0; }
  .add-btn { width: 100%; padding: 9px; margin-top: 4px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .add-btn:hover { background: var(--bg3); }
  .add-btn:active { transform: scale(0.98); }

  /* Filters — now multi-select toggles */
  .filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
  .fb { font-size: 12px; padding: 5px 11px; border-radius: 20px; border: 0.5px solid var(--border2); background: var(--bg); color: var(--text2); cursor: pointer; user-select: none; }
  .fb.active { background: var(--bg3); color: var(--text); border-color: var(--border2); font-weight: 500; }

  /* Section headers */
  .section-hdr { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: .07em; color: var(--text2); margin: 1.25rem 0 .5rem; padding-bottom: 6px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; gap: 8px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .d1{background:#E24B4A;} .d2{background:#639922;} .d3{background:#888780;} .d4{background:#BA7517;}

  /* Item card */
  .item { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); border-left: 3px solid; border-top-left-radius: 0; border-bottom-left-radius: 0; margin-bottom: 7px; overflow: hidden; }
  .acc1{border-left-color:#E24B4A;} .acc2{border-left-color:#639922;} .acc3{border-left-color:#B4B2A9;} .acc4{border-left-color:#BA7517;}
  .item.cleared { opacity: .4; }

  /* Item top row */
  .item-row { padding: .8rem 1rem; display: flex; align-items: flex-start; gap: 10px; cursor: pointer; }
  .item-row:hover { background: var(--bg2); }
  .item.expanded .item-row { background: var(--bg2); }

  /* Checkmark */
  .chk { width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid var(--border2); background: transparent; cursor: pointer; flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #3B6D11; }
  .chk.on { background: #EAF3DE; border-color: #639922; }

  .item-body { flex: 1; min-width: 0; }
  .item-name { font-weight: 500; margin-bottom: 4px; word-break: break-word; }
  .item-name.cleared { text-decoration: line-through; }
  .item-meta { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }

  /* Badges */
  .badge { font-size: 11px; padding: 2px 7px; border-radius: 20px; font-weight: 500; }
  .b1{background:#FCEBEB;color:#A32D2D;} .b2{background:#EAF3DE;color:#3B6D11;}
  .b3{background:#F1EFE8;color:#5F5E5A;} .b4{background:#FAEEDA;color:#854F0B;}
  .bwork{background:#E6F1FB;color:#185FA5;} .bpersonal{background:#EEEDFE;color:#534AB7;}

  /* Priority badge on item */
  .pri-badge { font-size: 10px; padding: 2px 6px; border-radius: 20px; font-weight: 600; display: inline-flex; align-items: center; gap: 2px; }
  .pri-high  { background: #FFF0C2; color: #7A4F00; }
  .pri-high2 { background: #FFD700; color: #5A3800; }
  .pri-low   { background: #EBEBEB; color: #666; }

  .item-note { font-size: 12px; color: var(--text2); margin-top: 4px; font-style: italic; }

  /* Priority quick-tap buttons */
  .pri-btns { display: flex; flex-direction: column; gap: 2px; flex-shrink: 0; margin-top: 1px; }
  .pri-btn { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 13px; padding: 1px 3px; line-height: 1; border-radius: 4px; }
  .pri-btn:hover { background: var(--bg3); color: var(--text); }
  .pri-btn.pri-active { color: var(--text); }

  /* Delete button */
  .del-btn { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 16px; padding: 2px 4px; flex-shrink: 0; }
  .del-btn:hover { color: #A32D2D; }

  /* Inline edit panel */
  .item-edit { display: none; padding: .75rem 1rem 1rem; border-top: 0.5px solid var(--border); background: var(--bg2); }
  .item.expanded .item-edit { display: block; }
  .edit-field { width: 100%; padding: 7px 10px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); font-size: 13px; margin-bottom: 7px; }
  .edit-row { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-bottom: 7px; }
  .edit-row select { margin-bottom: 0; }
  .edit-row select { width: 100%; padding: 7px 10px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); font-size: 13px; }
  .edit-actions { display: flex; gap: 7px; margin-top: 2px; }
  .edit-save { flex: 1; padding: 7px; border-radius: var(--radius); border: 0.5px solid #378ADD; background: #E6F1FB; color: #185FA5; font-size: 13px; cursor: pointer; font-weight: 500; }
  .edit-save:hover { background: #d0e8f8; }
  .edit-cancel { padding: 7px 14px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg); color: var(--text2); font-size: 13px; cursor: pointer; }
  .edit-cancel:hover { background: var(--bg3); }
  .edit-label { font-size: 11px; color: var(--text3); margin-bottom: 3px; }

  /* Priority selector inside edit panel */
  .pri-selector { display: flex; gap: 6px; margin-bottom: 7px; }
  .pri-opt { flex: 1; padding: 6px 4px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg); color: var(--text2); font-size: 12px; cursor: pointer; text-align: center; transition: all 0.1s; }
  .pri-opt:hover { background: var(--bg3); }
  .pri-opt.selected { border-color: var(--border2); font-weight: 600; }
  .pri-opt.sel-high2 { background: #FFD700; color: #5A3800; border-color: #CCA800; }
  .pri-opt.sel-high  { background: #FFF0C2; color: #7A4F00; border-color: #E8C84A; }
  .pri-opt.sel-normal{ background: var(--bg3); color: var(--text); }
  .pri-opt.sel-low   { background: #EBEBEB; color: #555; border-color: #CCC; }

  /* Misc */
  .empty { text-align: center; color: var(--text2); padding: 2rem 0; font-size: 13px; }
  .sync-status { font-size: 11px; color: var(--text3); text-align: right; margin-bottom: .5rem; min-height: 16px; }
  .sync-status.error { color: #A32D2D; }
  .sync-status.ok { color: #3B6D11; }

  @media (max-width: 500px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .form-row { grid-template-columns: 1fr; }
    .edit-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="app">
  <h1>
    <i class="ti ti-chart-bar"></i> Energy tracker
    <span class="h1-right">
      <button class="theme-btn" id="theme-btn" onclick="toggleTheme()" title="Toggle light/dark mode">
        <i class="ti ti-sun" id="theme-icon"></i>
      </button>
    </span>
  </h1>

  <div class="setup-banner" id="setup-banner">
    <strong>One-time setup:</strong> Paste your Google Apps Script URL below to connect your Google Sheet.
    See the setup guide included with this file.<br>
    <input type="text" id="script-url-input" placeholder="https://script.google.com/macros/s/YOUR_ID/exec" />
    <button onclick="saveScriptUrl()">Save &amp; connect</button>
  </div>

  <div class="sync-status" id="sync-status"></div>
  <div class="stats" id="stats"></div>

  <div class="form-card">
    <input type="text" id="f-name" placeholder="What's on your plate…" />
    <div class="form-row">
      <select id="f-cat">
        <option value="1">Risk / threat / distraction</option>
        <option value="2">Giving energy — want to do</option>
        <option value="3">Neutral / normal</option>
        <option value="4">Taking energy — watch it</option>
      </select>
      <select id="f-tag">
        <option value="work">Work</option>
        <option value="personal">Personal</option>
      </select>
    </div>
    <input type="text" id="f-note" placeholder="Note (optional)" />
    <button class="add-btn" onclick="addItem()"><i class="ti ti-plus"></i> Add</button>
  </div>

  <!-- Filter pills — multi-select toggles -->
  <div class="filters" id="filters">
    <button class="fb active" data-f="all"        onclick="toggleFilter('all',this)">All</button>
    <button class="fb"        data-f="work"       onclick="toggleFilter('work',this)">Work</button>
    <button class="fb"        data-f="personal"   onclick="toggleFilter('personal',this)">Personal</button>
    <button class="fb"        data-f="prioritized" onclick="toggleFilter('prioritized',this)">⭐ Prioritized</button>
  </div>

  <div id="list"></div>
</div>

<script>
const CATS = {
  '1': { label: 'Risk / threat / distraction', short: 'Risk', cls: 'b1', acc: 'acc1', dot: 'd1' },
  '2': { label: 'Giving energy', short: 'Energizing', cls: 'b2', acc: 'acc2', dot: 'd2' },
  '3': { label: 'Neutral / normal', short: 'Neutral', cls: 'b3', acc: 'acc3', dot: 'd3' },
  '4': { label: 'Taking energy', short: 'Draining', cls: 'b4', acc: 'acc4', dot: 'd4' }
};

const PRI = {
  '0': { label: '!! Top', badge: '!!', cls: 'pri-high2', selCls: 'sel-high2' },
  '1': { label: '! High', badge: '!',  cls: 'pri-high',  selCls: 'sel-high' },
  '2': { label: 'Normal', badge: null, cls: '',           selCls: 'sel-normal' },
  '3': { label: 'Low',    badge: '↓',  cls: 'pri-low',   selCls: 'sel-low' }
};

const CAT_ORDER = ['1','2','3','4'];

let items = [];
let expandedId = null;

// activeFilters: a Set of active filter keys.
// Rules:
//   'all' is the default / reset state — shown alone, means no filtering
//   'work', 'personal', 'prioritized' can be combined freely
//   Activating any specific filter deactivates 'all', and vice versa
let activeFilters = new Set(['all']);

// ── Theme ────────────────────────────────────────────────────────────────────
const savedTheme = localStorage.getItem('et_theme'); // 'light' | 'dark' | null
if (savedTheme) {
  document.documentElement.classList.add(savedTheme);
}
updateThemeIcon();

function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.classList.contains('dark') ||
    (!html.classList.contains('light') && window.matchMedia('(prefers-color-scheme: dark)').matches);
  if (isDark) {
    html.classList.remove('dark');
    html.classList.add('light');
    localStorage.setItem('et_theme', 'light');
  } else {
    html.classList.remove('light');
    html.classList.add('dark');
    localStorage.setItem('et_theme', 'dark');
  }
  updateThemeIcon();
}

function updateThemeIcon() {
  const html = document.documentElement;
  const isDark = html.classList.contains('dark') ||
    (!html.classList.contains('light') && window.matchMedia('(prefers-color-scheme: dark)').matches);
  const icon = document.getElementById('theme-icon');
  if (icon) {
    icon.className = isDark ? 'ti ti-moon' : 'ti ti-sun';
  }
}

// ── Script URL / data loading ─────────────────────────────────────────────────
let SCRIPT_URL = localStorage.getItem('et_script_url') || '';

if (SCRIPT_URL) {
  document.getElementById('setup-banner').style.display = 'none';
  loadFromSheet();
} else {
  try { items = JSON.parse(localStorage.getItem('et_items') || '[]'); } catch(e) { items = []; }
  normalizeItems();
  render();
}

function saveScriptUrl() {
  const val = document.getElementById('script-url-input').value.trim();
  if (!val.startsWith('https://script.google.com')) { alert('Please paste a valid Google Apps Script URL.'); return; }
  SCRIPT_URL = val;
  localStorage.setItem('et_script_url', SCRIPT_URL);
  document.getElementById('setup-banner').style.display = 'none';
  setStatus('Connecting…', '');
  loadFromSheet();
}

function setStatus(msg, cls) {
  const el = document.getElementById('sync-status');
  el.textContent = msg;
  el.className = 'sync-status ' + (cls || '');
}

function normalizeItems() {
  items = items.map(i => ({
    ...i,
    cat: String(i.cat),
    pri: i.pri !== undefined ? String(i.pri) : '2',
    added: i.added ? String(i.added).slice(0, 10) : ''
  }));
}

async function loadFromSheet() {
  if (!SCRIPT_URL) return;
  setStatus('Loading…', '');
  try {
    const res = await fetch(SCRIPT_URL + '?action=get');
    const data = await res.json();
    items = data;
    normalizeItems();
    localStorage.setItem('et_items', JSON.stringify(items));
    setStatus('Synced ' + new Date().toLocaleTimeString(), 'ok');
    render();
  } catch(e) {
    try { items = JSON.parse(localStorage.getItem('et_items') || '[]'); } catch(e2) { items = []; }
    normalizeItems();
    setStatus('Offline — showing cached data', 'error');
    render();
  }
}

async function syncToSheet(action, payload) {
  if (!SCRIPT_URL) { localStorage.setItem('et_items', JSON.stringify(items)); return; }
  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action, ...payload })
    });
    setStatus('Synced ' + new Date().toLocaleTimeString(), 'ok');
  } catch(e) {
    setStatus('Sync failed — saved locally', 'error');
  }
  localStorage.setItem('et_items', JSON.stringify(items));
}

// ── Filters ──────────────────────────────────────────────────────────────────
function toggleFilter(key, el) {
  if (key === 'all') {
    // All resets everything
    activeFilters = new Set(['all']);
  } else {
    activeFilters.delete('all');
    if (activeFilters.has(key)) {
      activeFilters.delete(key);
      if (activeFilters.size === 0) activeFilters.add('all'); // back to All if nothing left
    } else {
      activeFilters.add(key);
    }
  }
  expandedId = null;
  updateFilterUI();
  render();
}

function updateFilterUI() {
  document.querySelectorAll('.fb').forEach(b => {
    b.classList.toggle('active', activeFilters.has(b.dataset.f));
  });
}

// ── Stat box filter (clicking Risk/Energizing/etc sets category view) ─────────
function setStatFilter(cat) {
  // Stat box click: set to single-category view (replaces current filter)
  activeFilters = new Set([cat]);
  expandedId = null;
  document.querySelectorAll('.fb').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.stat').forEach(s => s.classList.remove('active-stat'));
  document.getElementById('stat-' + cat).classList.add('active-stat');
  render();
}

// ── Item actions ──────────────────────────────────────────────────────────────
function addItem() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { document.getElementById('f-name').focus(); return; }
  const item = {
    id: Date.now(),
    name,
    cat: document.getElementById('f-cat').value,
    tag: document.getElementById('f-tag').value,
    note: document.getElementById('f-note').value.trim(),
    cleared: false,
    added: new Date().toISOString().slice(0,10),
    pri: '2'
  };
  items.unshift(item);
  document.getElementById('f-name').value = '';
  document.getElementById('f-note').value = '';
  render();
  syncToSheet('add', { item });
}

function toggle(id, e) {
  e.stopPropagation();
  const it = items.find(i => i.id === id);
  if (!it) return;
  it.cleared = !it.cleared;
  if (expandedId === id) expandedId = null;
  render();
  syncToSheet('update', { item: it });
}

function del(id, e) {
  e.stopPropagation();
  items = items.filter(i => i.id !== id);
  if (expandedId === id) expandedId = null;
  render();
  syncToSheet('delete', { id });
}

function changePri(id, direction, e) {
  e.stopPropagation();
  const it = items.find(i => i.id === id);
  if (!it) return;
  let p = parseInt(it.pri || '2');
  if (direction === 'up')   p = Math.max(0, p - 1);
  if (direction === 'down') p = Math.min(3, p + 1);
  it.pri = String(p);
  render();
  syncToSheet('update', { item: it });
}

function toggleExpand(id, e) {
  if (e.target.closest('.chk') || e.target.closest('.del-btn') || e.target.closest('.pri-btn')) return;
  expandedId = expandedId === id ? null : id;
  render();
}

function saveEdit(id) {
  const it = items.find(i => i.id === id);
  if (!it) return;
  it.name = document.getElementById('edit-name-' + id).value.trim() || it.name;
  it.cat  = document.getElementById('edit-cat-'  + id).value;
  it.tag  = document.getElementById('edit-tag-'  + id).value;
  it.note = document.getElementById('edit-note-' + id).value.trim();
  const sel = document.querySelector(`#edit-pri-${id} .pri-opt.selected`);
  if (sel) it.pri = sel.dataset.val;
  expandedId = null;
  render();
  syncToSheet('update', { item: it });
}

function cancelEdit() { expandedId = null; render(); }

function selectPri(id, val) {
  document.querySelectorAll(`#edit-pri-${id} .pri-opt`).forEach(el => {
    const isSelected = el.dataset.val === val;
    el.className = 'pri-opt' + (isSelected ? ' selected ' + PRI[el.dataset.val].selCls : '');
  });
}

// ── Sorting & visibility ──────────────────────────────────────────────────────
function sortItems(arr) {
  return [...arr].sort((a, b) => {
    if (a.cleared !== b.cleared) return a.cleared ? 1 : -1;
    const pa = parseInt(a.pri || '2'), pb = parseInt(b.pri || '2');
    if (pa !== pb) return pa - pb;
    return (b.added || '').localeCompare(a.added || '');
  });
}

function visible() {
  // Category filter from stat box click (single cat key in activeFilters)
  const catFilter = [...activeFilters].find(f => CAT_ORDER.includes(f));
  if (catFilter) return items.filter(i => i.cat === catFilter);

  // Pill filters — combine as AND
  const wantWork       = activeFilters.has('work');
  const wantPersonal   = activeFilters.has('personal');
  const wantPrioritized = activeFilters.has('prioritized');
  const isAll          = activeFilters.has('all');

  if (isAll) return items.filter(i => !i.cleared);

  return items.filter(i => {
    if (i.cleared) return false;
    if (wantWork && wantPersonal) {
      // both selected = show both tags
    } else if (wantWork && i.tag !== 'work') return false;
    else if (wantPersonal && i.tag !== 'personal') return false;
    if (wantPrioritized && parseInt(i.pri || '2') >= 2) return false;
    return true;
  });
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  // Stats
  const counts = {'1':0,'2':0,'3':0,'4':0};
  items.filter(i => !i.cleared).forEach(i => { if (counts[i.cat] !== undefined) counts[i.cat]++; });
  const catFilter = [...activeFilters].find(f => CAT_ORDER.includes(f));
  document.getElementById('stats').innerHTML = CAT_ORDER.map(k => {
    const c = CATS[k];
    const isActive = catFilter === k;
    return `<div class="stat s${k}${isActive ? ' active-stat' : ''}" id="stat-${k}"
      onclick="setStatFilter('${k}')" role="button" tabindex="0"
      onkeydown="if(event.key==='Enter')setStatFilter('${k}')">
      <div class="stat-num">${counts[k]}</div>
      <div class="stat-lbl">${c.short}</div>
    </div>`;
  }).join('');

  updateFilterUI();

  const vis = visible();
  const listEl = document.getElementById('list');
  if (!vis.length) { listEl.innerHTML = '<div class="empty">Nothing here</div>'; return; }

  let html = '';
  if (catFilter) {
    // Single category from stat box — flat sorted list
    sortItems(vis).forEach(i => { html += itemHTML(i); });
  } else {
    // Pill filters — group by category in fixed order
    CAT_ORDER.forEach(k => {
      const group = vis.filter(i => i.cat === k);
      if (!group.length) return;
      const c = CATS[k];
      html += `<div class="section-hdr"><span class="dot ${c.dot}"></span>${c.label}</div>`;
      sortItems(group).forEach(i => { html += itemHTML(i); });
    });
  }
  listEl.innerHTML = html;
}

function itemHTML(i) {
  const c = CATS[i.cat];
  const pri = i.pri || '2';
  const priInfo = PRI[pri];
  const isExpanded = expandedId === i.id;

  const upActive   = parseInt(pri) < 2 ? 'pri-active' : '';
  const downActive = parseInt(pri) > 2 ? 'pri-active' : '';

  const priBtns = `<div class="pri-btns">
    <button class="pri-btn ${upActive}"   onclick="changePri(${i.id},'up',event)"   title="Raise priority">▲</button>
    <button class="pri-btn ${downActive}" onclick="changePri(${i.id},'down',event)" title="Lower priority">▼</button>
  </div>`;

  const priBadge = priInfo.badge
    ? `<span class="pri-badge ${priInfo.cls}">${priInfo.badge}</span>`
    : '';

  const editPanel = `<div class="item-edit">
    <div class="edit-label">Name</div>
    <input class="edit-field" id="edit-name-${i.id}" value="${i.name.replace(/"/g,'&quot;')}" />
    <div class="edit-row">
      <div>
        <div class="edit-label">Category</div>
        <select class="edit-field" id="edit-cat-${i.id}" style="margin-bottom:0">
          <option value="1" ${i.cat==='1'?'selected':''}>Risk / threat / distraction</option>
          <option value="2" ${i.cat==='2'?'selected':''}>Giving energy — want to do</option>
          <option value="3" ${i.cat==='3'?'selected':''}>Neutral / normal</option>
          <option value="4" ${i.cat==='4'?'selected':''}>Taking energy — watch it</option>
        </select>
      </div>
      <div>
        <div class="edit-label">Tag</div>
        <select class="edit-field" id="edit-tag-${i.id}" style="margin-bottom:0">
          <option value="work"     ${i.tag==='work'    ?'selected':''}>Work</option>
          <option value="personal" ${i.tag==='personal'?'selected':''}>Personal</option>
        </select>
      </div>
    </div>
    <div class="edit-label">Priority</div>
    <div class="pri-selector" id="edit-pri-${i.id}">
      ${['0','1','2','3'].map(v => {
        const isSel = v === pri;
        return `<div class="pri-opt${isSel ? ' selected ' + PRI[v].selCls : ''}" data-val="${v}" onclick="selectPri(${i.id},'${v}')">${PRI[v].label}</div>`;
      }).join('')}
    </div>
    <div class="edit-label">Note</div>
    <input class="edit-field" id="edit-note-${i.id}" value="${(i.note||'').replace(/"/g,'&quot;')}" placeholder="Optional note" />
    <div class="edit-actions">
      <button class="edit-save"   onclick="saveEdit(${i.id})">Save</button>
      <button class="edit-cancel" onclick="cancelEdit()">Cancel</button>
    </div>
  </div>`;

  return `<div class="item ${c.acc} ${i.cleared?'cleared':''} ${isExpanded?'expanded':''}" id="item-${i.id}">
    <div class="item-row" onclick="toggleExpand(${i.id},event)">
      <div class="chk ${i.cleared?'on':''}" onclick="toggle(${i.id},event)" role="checkbox" aria-checked="${i.cleared}" tabindex="0">
        ${i.cleared ? '<i class="ti ti-check"></i>' : ''}
      </div>
      <div class="item-body">
        <div class="item-name ${i.cleared?'cleared':''}">${i.name}</div>
        <div class="item-meta">
          <span class="badge ${c.cls}">${c.short}</span>
          <span class="badge ${i.tag==='work'?'bwork':'bpersonal'}">${i.tag}</span>
          ${priBadge}
          ${i.added ? `<span style="font-size:11px;color:var(--text3)">${i.added}</span>` : ''}
        </div>
        ${i.note ? `<div class="item-note">${i.note}</div>` : ''}
      </div>
      ${priBtns}
      <button class="del-btn" onclick="del(${i.id},event)" aria-label="Remove"><i class="ti ti-trash"></i></button>
    </div>
    ${editPanel}
  </div>`;
}

document.getElementById('f-name').addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });
</script>
</body>
</html>
