<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Energy Tracker</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  :root {
    --bg: #ffffff;
    --bg2: #f7f7f5;
    --bg3: #f0efe9;
    --text: #1a1a18;
    --text2: #6b6b67;
    --text3: #9b9b96;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --radius: 8px;
    --radius-lg: 12px;
  }

  html.dark {
    --bg: #1c1c1a !important;
    --bg2: #252523 !important;
    --bg3: #2e2e2b !important;
    --text: #f0efe9 !important;
    --text2: #a8a8a3 !important;
    --text3: #6b6b67 !important;
    --border: rgba(255,255,255,0.12) !important;
    --border2: rgba(255,255,255,0.22) !important;
  }
  html.light {
    --bg: #ffffff !important;
    --bg2: #f7f7f5 !important;
    --bg3: #f0efe9 !important;
    --text: #1a1a18 !important;
    --text2: #6b6b67 !important;
    --text3: #9b9b96 !important;
    --border: rgba(0,0,0,0.12) !important;
    --border2: rgba(0,0,0,0.22) !important;
  }
  @media (prefers-color-scheme: dark) {
    html:not(.light):not(.dark) {
      --bg: #1c1c1a;
      --bg2: #252523;
      --bg3: #2e2e2b;
      --text: #f0efe9;
      --text2: #a8a8a3;
      --text3: #6b6b67;
      --border: rgba(255,255,255,0.12);
      --border2: rgba(255,255,255,0.22);
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--text); font-size: 15px; min-height: 100vh; }
  .app { max-width: 720px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }

  /* Header */
  h1 { font-size: 20px; font-weight: 500; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 10px; }
  .h1-right { margin-left: auto; }
  .theme-btn { background: none; border: none; cursor: pointer; color: var(--text2); font-size: 20px; padding: 2px 4px; border-radius: 6px; display: flex; align-items: center; }
  .theme-btn:hover { color: var(--text); background: var(--bg2); }
  .clock-btn { background: none; border: none; cursor: pointer; font-size: 18px; padding: 2px 6px; border-radius: 6px; display: flex; align-items: center; transition: background .15s; }
  .clock-btn:hover { background: var(--bg2); }
  .clock-btn.off-clock { background: #E0F5EC; border-radius: 6px; }

  /* Setup banner */
  .setup-banner { background: #E6F1FB; border: 0.5px solid #B5D4F4; border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 1.25rem; font-size: 13px; color: #0C447C; line-height: 1.6; }
  .setup-banner strong { font-weight: 500; }
  .setup-banner input { width: 100%; margin-top: 8px; padding: 7px 10px; border-radius: var(--radius); border: 0.5px solid #85B7EB; font-size: 13px; background: white; color: #042C53; }
  .setup-banner button { margin-top: 8px; padding: 6px 14px; font-size: 13px; border-radius: var(--radius); border: 0.5px solid #378ADD; background: #E6F1FB; color: #185FA5; cursor: pointer; }

  /* Stats */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 1.25rem; }
  .stat { background: var(--bg); border-radius: var(--radius-lg); padding: 14px 10px 12px; text-align: center; border: 1.5px solid transparent; cursor: pointer; transition: border-color .15s, background .15s; user-select: none; }
  .stat:hover { background: var(--bg2); }
  .stat.active-stat { border-color: var(--border2); background: var(--bg2); }
  .stat-num { font-size: 26px; font-weight: 600; line-height: 1; }
  .stat-lbl { font-size: 11px; color: var(--text2); margin-top: 4px; text-transform: uppercase; letter-spacing: .04em; }
  .s-risk { background: #FEF2F2; border-color: #FACACA; }
  .s-enrg { background: #F0FBF5; border-color: #C3EDD6; }
  .s-neut { background: var(--bg); }
  .s-drai { background: #FFFBF0; border-color: #FAEBD7; }
  .s-risk .stat-num { color: #D94848; }
  .s-enrg .stat-num { color: #3A9E6C; }
  .s-neut .stat-num { color: #7A7A75; }
  .s-drai .stat-num { color: #C47D24; }

  /* Pomodoro timer */
  .pomo-bar { background: var(--bg); border-radius: var(--radius-lg); padding: 12px 16px; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .pomo-display { font-size: 22px; font-weight: 600; letter-spacing: .04em; min-width: 70px; }
  .pomo-status { font-size: 12px; color: var(--text2); min-width: 44px; }
  .pomo-presets { display: flex; gap: 6px; }
  .pomo-preset { padding: 4px 10px; font-size: 12px; border-radius: 20px; border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text2); cursor: pointer; }
  .pomo-preset:hover, .pomo-preset.active { background: var(--text); color: var(--bg); }
  .pomo-btns { display: flex; gap: 6px; margin-left: auto; }
  .pomo-btn { padding: 5px 14px; font-size: 13px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text); cursor: pointer; }
  .pomo-btn:hover { background: var(--bg3); }
  .pomo-btn.start { background: var(--text); color: var(--bg); }
  .pomo-btn.start:hover { opacity: .85; }
  .pomo-progress-wrap { width: 100%; height: 4px; background: var(--bg3); border-radius: 2px; margin-top: 2px; }
  .pomo-progress-bar  { height: 4px; background: #3A9E6C; border-radius: 2px; transition: width .9s linear; width: 100%; }

  /* Focus goal section */
  .focus-section { width: 100%; padding-top: 10px; border-top: 0.5px solid var(--border); margin-top: 8px; }
  .focus-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 6px; }
  .focus-total { font-size: 15px; font-weight: 600; }
  .focus-goal-label { font-size: 12px; color: var(--text2); }
  .focus-goal-input { width: 40px; padding: 1px 5px; border-radius: 4px; border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text); font-size: 12px; text-align: center; }
  .focus-reset-btn { font-size: 11px; color: var(--text3); background: none; border: none; cursor: pointer; padding: 2px 4px; border-radius: 4px; margin-left: auto; }
  .focus-reset-btn:hover { color: var(--text); background: var(--bg2); }
  /* Chunked bar */
  .focus-chunks-wrap { position: relative; height: 18px; background: var(--bg3); border-radius: 4px; overflow: hidden; margin-bottom: 5px; }
  .focus-chunks-fill { display: flex; height: 100%; gap: 2px; padding: 2px; box-sizing: border-box; }
  .focus-chunk { height: 100%; border-radius: 2px; background: #3A9E6C; flex-shrink: 0; transition: width .3s ease; }
  .focus-chunk.partial { opacity: 0.5; }
  .focus-goal-line { position: absolute; top: 0; bottom: 0; width: 2px; background: var(--text2); opacity: 0.4; border-radius: 1px; }
  /* Legend */
  .focus-legend { display: flex; align-items: center; gap: 12px; font-size: 11px; color: var(--text3); flex-wrap: wrap; }
  .focus-legend-item { display: flex; align-items: center; gap: 4px; }
  .focus-legend-swatch { width: 10px; height: 10px; border-radius: 2px; }

  /* Add form */
  .add-form { background: var(--bg); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 1.25rem; display: flex; flex-direction: column; gap: 10px; }
  .add-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .add-row input, .add-row select { flex: 1; min-width: 120px; padding: 8px 10px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text); font-size: 14px; }
  .add-btn { padding: 8px 18px; border-radius: var(--radius); border: none; background: var(--text); color: var(--bg); font-size: 14px; font-weight: 500; cursor: pointer; white-space: nowrap; }
  .add-btn:hover { opacity: .85; }

  /* Filters */
  .filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
  .pill { padding: 6px 14px; border-radius: 20px; font-size: 13px; border: 1.5px solid var(--border); background: var(--bg); color: var(--text2); cursor: pointer; transition: all .12s; user-select: none; }
  .pill:hover { border-color: var(--border2); color: var(--text); }
  .pill.active { background: var(--text); color: var(--bg); border-color: var(--text); }
  .pill.starred-pill { border-color: #f59e0b; color: #b45309; }
  .pill.starred-pill.active { background: #f59e0b; border-color: #f59e0b; color: #fff; }

  /* List */
  .section-hdr { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--text3); padding: 16px 0 6px; display: flex; align-items: center; gap: 6px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .dot-risk { background: #D94848; }
  .dot-enrg { background: #3A9E6C; }
  .dot-neut { background: #9b9b96; }
  .dot-drai { background: #C47D24; }
  .empty { color: var(--text3); text-align: center; padding: 2rem; font-size: 14px; }


  /* ── Outreach panel ──────────────────────────────────────────── */
  .outreach-panel { background: var(--bg); border-radius: var(--radius-lg); border: 0.5px solid var(--border); margin-bottom: 1.25rem; overflow: hidden; }
  .outreach-hdr { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: var(--bg2); border-bottom: 0.5px solid var(--border); cursor: pointer; user-select: none; }
  .outreach-hdr-title { font-size: 13px; font-weight: 500; flex: 1; display: flex; align-items: center; gap: 8px; }
  .outreach-count { font-size: 11px; border: 0.5px solid var(--border); border-radius: 20px; padding: 1px 8px; color: var(--text2); }
  .outreach-type-toggle { display: flex; border: 0.5px solid var(--border2); border-radius: 20px; overflow: hidden; font-size: 11px; }
  .outreach-type-btn { padding: 3px 10px; cursor: pointer; color: var(--text2); background: none; border: none; }
  .outreach-type-btn.active { background: var(--text); color: var(--bg); }
  .outreach-chevron { font-size: 16px; color: var(--text2); transition: transform .2s; }
  .outreach-panel.collapsed .outreach-chevron { transform: rotate(-90deg); }
  .outreach-panel.collapsed .outreach-body { display: none; }
  .outreach-body {}
  .outreach-add { display: flex; gap: 6px; padding: 10px 14px; border-bottom: 0.5px solid var(--border); }
  .outreach-add input { flex: 1; padding: 6px 10px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text); font-size: 13px; }
  .outreach-add select { padding: 5px 8px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text); font-size: 12px; }
  .outreach-add button { padding: 6px 14px; border-radius: var(--radius); border: none; background: var(--text); color: var(--bg); font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; }
  .outreach-list { padding: 6px 10px; display: flex; flex-direction: column; gap: 3px; }
  .outreach-row { display: flex; align-items: center; gap: 6px; padding: 7px 8px; border-radius: var(--radius); }
  .outreach-row:hover { background: var(--bg2); }
  .outreach-chk { width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid var(--border2); display: flex; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; flex-shrink: 0; }
  .outreach-chk.done { background: var(--text2); border-color: var(--text2); color: var(--bg); }
  /* energy dot — tappable cycling color */
  .e-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; cursor: pointer; border: 1.5px solid var(--border2); transition: background .15s; }
  .e-dot.e1 { background: #D94848; border-color: #D94848; }
  .e-dot.e2 { background: #3A9E6C; border-color: #3A9E6C; }
  .e-dot.e3 { background: #9b9b96; border-color: #9b9b96; }
  .e-dot.e4 { background: #C47D24; border-color: #C47D24; }
  .outreach-icon { font-size: 13px; color: var(--text2); flex-shrink: 0; }
  .outreach-name { font-size: 13px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: text; }
  .outreach-name.done { text-decoration: line-through; color: var(--text3); }
  .outreach-name-input { font-size: 13px; flex: 1; min-width: 0; padding: 2px 6px; border-radius: 4px; border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text); }
  .outreach-pri-badge { font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 3px; flex-shrink: 0; }
  .outreach-star { background: none; border: none; cursor: pointer; font-size: 15px; color: var(--border2); padding: 0 2px; flex-shrink: 0; line-height: 1; }
  .outreach-star.on { color: #f59e0b; }
  .outreach-pri-btns { display: flex; flex-direction: column; gap: 1px; flex-shrink: 0; }
  .outreach-pri-btn { background: none; border: none; font-size: 9px; cursor: pointer; color: var(--text3); padding: 1px 3px; border-radius: 3px; line-height: 1; }
  .outreach-pri-btn:hover { color: var(--text); background: var(--bg2); }
  .outreach-pri-btn.active { color: var(--text); }
  .outreach-del { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 14px; padding: 2px; border-radius: 4px; flex-shrink: 0; display: flex; align-items: center; }
  .outreach-del:hover { color: #D94848; background: #FDE8E8; }
  .outreach-footer { display: flex; align-items: center; justify-content: space-between; padding: 8px 14px 10px; border-top: 0.5px solid var(--border); }
  .outreach-done-count { font-size: 12px; color: var(--text2); }
  .outreach-archive-btn { font-size: 11px; color: var(--text3); background: none; border: 0.5px solid var(--border); padding: 3px 10px; border-radius: 20px; cursor: pointer; }
  .outreach-archive-btn:hover { color: #7A4D10; border-color: #C47D24; background: #FEF3E2; }
  .outreach-empty { font-size: 13px; color: var(--text3); text-align: center; padding: 1rem; }

  /* Items */
  .item { background: var(--bg); border-radius: var(--radius-lg); margin-bottom: 6px; border: 0.5px solid var(--border); overflow: hidden; display: flex; flex-direction: column; position: relative; }
  .item::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; border-radius: var(--radius-lg) 0 0 var(--radius-lg); }
  .item.acc-risk::before  { background: #D94848; }
  .item.acc-enrg::before  { background: #3A9E6C; }
  .item.acc-neut::before  { background: #9b9b96; }
  .item.acc-drai::before  { background: #C47D24; }
  .item.cleared { opacity: .55; }

  /* Star glow on starred items */
  .item.starred-item { box-shadow: 0 0 0 1.5px #f59e0b44; }

  .item-row { display: flex; align-items: center; gap: 10px; padding: 11px 12px 11px 16px; cursor: pointer; }
  .chk { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--border2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 11px; cursor: pointer; }
  .chk.on { background: var(--text2); border-color: var(--text2); color: var(--bg); }
  .item-body { flex: 1; min-width: 0; }
  .item-name { font-size: 14px; line-height: 1.4; }
  .item-name.cleared { text-decoration: line-through; color: var(--text3); }
  .item-meta { display: flex; align-items: center; gap: 5px; margin-top: 3px; flex-wrap: wrap; }
  .item-note { font-size: 12px; color: var(--text2); margin-top: 4px; }
  .badge { font-size: 10px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; padding: 2px 6px; border-radius: 4px; }
  .brisk { background: #FDE8E8; color: #9B2626; }
  .benrg { background: #E0F5EC; color: #1E6B46; }
  .bneut { background: #EBEBEB; color: #555552; }
  .bdrai { background: #FEF3E2; color: #7A4D10; }
  .bwork { background: #E8EFFE; color: #2A44A0; }
  .bpersonal { background: #F3E8FE; color: #6B28A0; }
  .pri-badge { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; }
  .pri-top { background: #FDE8E8; color: #9B2626; }
  .pri-high { background: #FEF3E2; color: #7A4D10; }
  .pri-low { background: #f0efe9; color: #9b9b96; }

  /* Star button on item */
  .star-btn {
    background: none; border: none; cursor: pointer;
    font-size: 18px; padding: 2px 4px;
    color: var(--border2);
    transition: color .12s, transform .1s;
    flex-shrink: 0;
    line-height: 1;
  }
  .star-btn:hover { color: #f59e0b; transform: scale(1.2); }
  .star-btn.on { color: #f59e0b; }

  /* Priority buttons */
  .pri-btns { display: flex; flex-direction: column; gap: 2px; flex-shrink: 0; }
  .pri-btn { background: none; border: none; font-size: 9px; cursor: pointer; color: var(--text3); padding: 1px 3px; border-radius: 3px; line-height: 1; }
  .pri-btn:hover { color: var(--text); background: var(--bg2); }
  .pri-btn.pri-active { color: var(--text); }

  .del-btn { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 16px; padding: 4px; border-radius: var(--radius); display: flex; align-items: center; flex-shrink: 0; }
  .del-btn:hover { color: #D94848; background: #FDE8E8; }
  /* Archive all button */
  .archive-all-btn { font-size: 12px; color: var(--text3); background: none; border: 0.5px solid var(--border); padding: 5px 12px; border-radius: 20px; cursor: pointer; white-space: nowrap; }
  .archive-all-btn:hover { color: #7A4D10; border-color: #C47D24; background: #FEF3E2; }

  /* Inline edit panel */
  .item-edit { display: none; padding: 12px 16px 16px; border-top: 0.5px solid var(--border); background: var(--bg2); }
  .item.expanded .item-edit { display: block; }
  .edit-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; color: var(--text3); margin-bottom: 4px; margin-top: 10px; }
  .edit-label:first-child { margin-top: 0; }
  .edit-field { width: 100%; padding: 7px 10px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); font-size: 14px; margin-bottom: 2px; }
  .edit-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .edit-actions { display: flex; gap: 8px; margin-top: 12px; }
  .edit-save { padding: 7px 18px; border-radius: var(--radius); border: none; background: var(--text); color: var(--bg); font-size: 13px; font-weight: 500; cursor: pointer; }
  .edit-save:hover { opacity: .85; }
  .edit-cancel { padding: 7px 14px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text2); font-size: 13px; cursor: pointer; }

  /* Priority selector in edit panel */
  .pri-selector { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
  .pri-opt { padding: 5px 12px; border-radius: 20px; font-size: 12px; border: 1.5px solid var(--border); background: var(--bg); color: var(--text2); cursor: pointer; }
  .pri-opt:hover { border-color: var(--border2); color: var(--text); }
  .pri-opt.selected { background: var(--text); color: var(--bg); border-color: var(--text); }
  .pri-opt.selected.sel-top  { background: #D94848; border-color: #D94848; color: #fff; }
  .pri-opt.selected.sel-high { background: #C47D24; border-color: #C47D24; color: #fff; }
  .pri-opt.selected.sel-low  { background: var(--bg3); color: var(--text2); border-color: var(--border2); }

  /* Star toggle in edit panel */
  .star-toggle-row { display: flex; align-items: center; gap: 10px; margin-top: 4px; }
  .star-toggle-btn { padding: 5px 14px; border-radius: 20px; font-size: 12px; border: 1.5px solid var(--border); background: var(--bg); color: var(--text2); cursor: pointer; display: flex; align-items: center; gap: 5px; }
  .star-toggle-btn:hover { border-color: #f59e0b; color: #b45309; }
  .star-toggle-btn.starred-on { background: #f59e0b; border-color: #f59e0b; color: #fff; }

  /* Errands panel — mirrors outreach but simpler */
  .errands-panel { background: var(--bg); border-radius: var(--radius-lg); border: 0.5px solid var(--border); margin-bottom: 1.25rem; overflow: hidden; }
  .errands-hdr { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: var(--bg2); border-bottom: 0.5px solid var(--border); cursor: pointer; user-select: none; }
  .errands-hdr-title { font-size: 13px; font-weight: 500; flex: 1; display: flex; align-items: center; gap: 8px; }
  .errands-count { font-size: 11px; border: 0.5px solid var(--border); border-radius: 20px; padding: 1px 8px; color: var(--text2); }
  .errands-chevron { font-size: 16px; color: var(--text2); transition: transform .2s; }
  .errands-panel.collapsed .errands-chevron { transform: rotate(-90deg); }
  .errands-panel.collapsed .errands-body { display: none; }
  .errands-add { display: flex; gap: 6px; padding: 10px 14px; border-bottom: 0.5px solid var(--border); }
  .errands-add input { flex: 1; padding: 6px 10px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text); font-size: 13px; }
  .errands-add button { padding: 6px 14px; border-radius: var(--radius); border: none; background: var(--text); color: var(--bg); font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; }
  .errands-list { padding: 6px 10px; display: flex; flex-direction: column; gap: 3px; }
  .errands-row { display: flex; align-items: center; gap: 6px; padding: 7px 8px; border-radius: var(--radius); }
  .errands-row:hover { background: var(--bg2); }
  .errands-chk { width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid var(--border2); display: flex; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; flex-shrink: 0; }
  .errands-chk.done { background: var(--text2); border-color: var(--text2); color: var(--bg); }
  .errands-name { font-size: 13px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: text; }
  .errands-name.done { text-decoration: line-through; color: var(--text3); }
  .errands-name-input { font-size: 13px; flex: 1; min-width: 0; padding: 2px 6px; border-radius: 4px; border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text); }
  .errands-star { background: none; border: none; cursor: pointer; font-size: 15px; color: var(--border2); padding: 0 2px; flex-shrink: 0; line-height: 1; }
  .errands-star.on { color: #f59e0b; }
  .errands-pri-btns { display: flex; flex-direction: column; gap: 1px; flex-shrink: 0; }
  .errands-pri-btn { background: none; border: none; font-size: 9px; cursor: pointer; color: var(--text3); padding: 1px 3px; border-radius: 3px; line-height: 1; }
  .errands-pri-btn:hover { color: var(--text); background: var(--bg2); }
  .errands-pri-btn.active { color: var(--text); }
  .errands-del { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 14px; padding: 2px; border-radius: 4px; flex-shrink: 0; display: flex; align-items: center; }
  .errands-del:hover { color: #D94848; background: #FDE8E8; }
  .errands-footer { display: flex; align-items: center; justify-content: space-between; padding: 8px 14px 10px; border-top: 0.5px solid var(--border); }
  .errands-done-count { font-size: 12px; color: var(--text2); }
  .errands-archive-btn { font-size: 11px; color: var(--text3); background: none; border: 0.5px solid var(--border); padding: 3px 10px; border-radius: 20px; cursor: pointer; }
  .errands-archive-btn:hover { color: #7A4D10; border-color: #C47D24; background: #FEF3E2; }
  .errands-empty { font-size: 13px; color: var(--text3); text-align: center; padding: 1rem; }
  @media (max-width: 500px) {
    .errands-add { flex-wrap: wrap; }
    .errands-add input { flex: 1 1 100%; }
    .errands-add button { flex: 1; }
  }

  /* Sync status */
  .sync-status { font-size: 12px; color: var(--text3); margin-bottom: .75rem; min-height: 1.2em; }
  .sync-ok  { color: #3A9E6C; }
  .sync-err { color: #D94848; }

  @media (max-width: 500px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .pomo-bar { gap: 8px; }
    .pomo-btns { margin-left: 0; width: 100%; }
    .add-row { flex-direction: column; align-items: stretch; }
    .edit-row { grid-template-columns: 1fr; }
    .outreach-add { flex-wrap: wrap; }
    .outreach-add input { flex: 1 1 100%; }
    .outreach-add select { flex: 1; }
    .outreach-add button { flex: 1; }
    .outreach-type-toggle { display: none; }
  }
</style>
</head>
<body>
<div class="app">

  <h1>
    <i class="ti ti-bolt" style="color:#C47D24"></i> Energy tracker
    <span class="h1-right" style="display:flex;align-items:center;gap:4px">
      <button class="clock-btn" onclick="toggleClock()" id="clock-btn" title="Toggle on/off the clock">
        <i id="clock-icon" class="ti ti-building" aria-hidden="true"></i>
      </button>
      <button class="theme-btn" onclick="toggleTheme()" id="theme-btn" title="Toggle dark/light mode">
        <i class="ti ti-sun" id="theme-icon"></i>
      </button>
    </span>
  </h1>

  <!-- Setup banner -->
  <div class="setup-banner" id="setup-banner" style="display:none">
    <strong>One-time setup:</strong> Paste your Google Apps Script URL below to connect your Google Sheet.
    See the setup guide included with this file.<br>
    <input type="text" id="script-url-input" placeholder="https://script.google.com/macros/s/..." />
    <button onclick="saveScriptUrl()">Save &amp; connect</button>
  </div>

  <!-- Pomodoro -->
  <div class="pomo-bar">
    <div class="pomo-display" id="pomo-display">25:00</div>
    <div class="pomo-status" id="pomo-status">Ready</div>
    <div class="pomo-presets">
      <button class="pomo-preset" onclick="setDuration(15)">15 min</button>
      <button class="pomo-preset active" onclick="setDuration(25)">25 min</button>
      <button class="pomo-preset" onclick="setDuration(45)">45 min</button>
    </div>
    <div class="pomo-btns">
      <button class="pomo-btn start" id="pomo-start" onclick="pomoToggle()">Start</button>
      <button class="pomo-btn" onclick="pomoReset()">Reset</button>
    </div>
    <div class="pomo-progress-wrap" style="width:100%">
      <div class="pomo-progress-bar" id="pomo-bar"></div>
    </div>
    <div class="focus-section">
      <div class="focus-header">
        <span class="focus-total" id="focus-total-display">0m focus today</span>
        <span class="focus-goal-label">/ goal:
          <input class="focus-goal-input" type="number" id="focus-goal-input" min="10" max="480" value="120" onchange="saveFocusGoal()" />
          min
        </span>
        <button class="focus-reset-btn" onclick="resetFocusDay()">↺ reset day</button>
      </div>
      <div class="focus-chunks-wrap">
        <div class="focus-chunks-fill" id="focus-chunks"></div>
        <div class="focus-goal-line" id="focus-goal-line"></div>
      </div>
      <div class="focus-legend" id="focus-legend"></div>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats" id="stats"></div>

  <!-- Sync status -->
  <div class="sync-status" id="sync-status"></div>

  <!-- Add form -->
  <div class="add-form">
    <div class="add-row">
      <input type="text" id="f-name" placeholder="New item…" />
    </div>
    <div class="add-row">
      <select id="f-cat">
        <option value="1">Risk / threat / distraction</option>
        <option value="2">Giving energy — want to do</option>
        <option value="3">Neutral / normal</option>
        <option value="4">Draining — but eat that frog</option>
      </select>
      <select id="f-tag">
        <option value="work">Work</option>
        <option value="personal">Personal</option>
      </select>
      <select id="f-pri">
        <option value="2">Normal priority</option>
        <option value="0">!! Top priority</option>
        <option value="1">! High priority</option>
        <option value="3">↓ Low priority</option>
      </select>
      <button class="add-btn" onclick="addItem()">Add</button>
    </div>
  </div>


  <!-- Outreach panel -->
  <div class="outreach-panel" id="outreach-panel">
    <div class="outreach-hdr" onclick="toggleOutreach()">
      <div class="outreach-hdr-title">
        <i class="ti ti-phone" aria-hidden="true"></i>
        Outreach
        <span class="outreach-count" id="outreach-count">0 remaining</span>
      </div>
      <div class="outreach-type-toggle" onclick="event.stopPropagation()">
        <button class="outreach-type-btn active" id="otype-all"      onclick="setOutreachType('all')">All</button>
        <button class="outreach-type-btn"        id="otype-call"     onclick="setOutreachType('call')">Calls</button>
        <button class="outreach-type-btn"        id="otype-email"    onclick="setOutreachType('email')">Emails</button>
        <button class="outreach-type-btn"        id="otype-linkedin" onclick="setOutreachType('linkedin')">LinkedIn</button>
      </div>
      <i class="ti ti-chevron-down outreach-chevron" aria-hidden="true"></i>
    </div>
    <div class="outreach-body">
      <div class="outreach-add">
        <input type="text" id="o-name" placeholder="Add names, comma-separated…" />
        <select id="o-type">
          <option value="call">Call</option>
          <option value="email">Email</option>
          <option value="linkedin">LinkedIn</option>
        </select>
        <button onclick="addOutreach()">Add</button>
      </div>
      <div class="outreach-list" id="outreach-list"></div>
      <div class="outreach-footer">
        <span class="outreach-done-count" id="outreach-done-count"></span>
        <button class="outreach-archive-btn" id="outreach-archive-btn" onclick="archiveOutreach()" style="display:none">Archive done</button>
      </div>
    </div>
  </div>

  <!-- Errands panel (off the clock mode) -->
  <div class="errands-panel" id="errands-panel" style="display:none">
    <div class="errands-hdr" onclick="toggleErrands()">
      <div class="errands-hdr-title">
        <i class='ti ti-shopping-cart' style='font-size:15px' aria-hidden='true'></i>
        Errands
        <span class="errands-count" id="errands-count">0 remaining</span>
      </div>
      <i class="ti ti-chevron-down errands-chevron" aria-hidden="true"></i>
    </div>
    <div class="errands-body">
      <div class="errands-add">
        <input type="text" id="e-name" placeholder="Add errands, comma-separated…" />
        <button onclick="addErrands()">Add</button>
      </div>
      <div class="errands-list" id="errands-list"></div>
      <div class="errands-footer">
        <span class="errands-done-count" id="errands-done-count"></span>
        <button class="errands-archive-btn" id="errands-archive-btn" onclick="archiveErrands()" style="display:none">Archive done</button>
      </div>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters" id="filters">
    <span class="pill active" data-pill="all" onclick="togglePill('all')">All</span>
    <span class="pill" data-pill="work" onclick="togglePill('work')">Work</span>
    <span class="pill" data-pill="personal" onclick="togglePill('personal')">Personal</span>
    <span class="pill" data-pill="prioritized" onclick="togglePill('prioritized')">!! Prioritized</span>
    <span class="pill starred-pill" data-pill="starred" onclick="togglePill('starred')">★ Today</span>
    <button class="archive-all-btn" id="archive-all-btn" onclick="archiveAllCleared()" style="display:none">↓ Archive all cleared</button>
  </div>

  <!-- List -->
  <div id="list"></div>

</div>

<script>
// ── Config ────────────────────────────────────────────────
const CATS = {
  '1': { label: 'Risk / threat / distraction', short: 'Risk',       cls: 'brisk', acc: 'acc-risk', dot: 'dot-risk', statCls: 's-risk' },
  '2': { label: 'Giving energy — want to do',  short: 'Energizing', cls: 'benrg', acc: 'acc-enrg', dot: 'dot-enrg', statCls: 's-enrg' },
  '3': { label: 'Neutral / normal',            short: 'Neutral',    cls: 'bneut', acc: 'acc-neut', dot: 'dot-neut', statCls: 's-neut' },
  '4': { label: 'Draining — but eat that frog', short: 'Draining',   cls: 'bdrai', acc: 'acc-drai', dot: 'dot-drai', statCls: 's-drai' },
};
const CAT_ORDER = ['1','2','3','4'];

// Priority levels: 0=!! Top, 1=! High, 2=Normal, 3=Low
const PRI = {
  '0': { label: '!! Top priority', badge: '!!', cls: 'pri-top',  selCls: 'sel-top'  },
  '1': { label: '! High priority', badge: '!',  cls: 'pri-high', selCls: 'sel-high' },
  '2': { label: 'Normal',          badge: '',   cls: '',         selCls: ''         },
  '3': { label: '↓ Low priority',  badge: '↓',  cls: 'pri-low',  selCls: 'sel-low'  },
};

// ── State ─────────────────────────────────────────────────
let offClock = localStorage.getItem('offClock') === 'true';
let items = [];
let activePills = new Set(['all']);
let catFilter   = null;   // set when stat box clicked
let expandedId  = null;
let scriptUrl   = localStorage.getItem('scriptUrl') || '';

// ── Theme ─────────────────────────────────────────────────
function initTheme() {
  const saved = localStorage.getItem('theme');
  if (saved === 'dark')  { document.documentElement.classList.add('dark');  }
  if (saved === 'light') { document.documentElement.classList.add('light'); }
  updateThemeIcon();
}
function toggleTheme() {
  const html = document.documentElement;
  if (html.classList.contains('dark')) {
    html.classList.remove('dark'); html.classList.add('light');
    localStorage.setItem('theme', 'light');
    applyThemeColors(false);
  } else {
    html.classList.remove('light'); html.classList.add('dark');
    localStorage.setItem('theme', 'dark');
    applyThemeColors(true);
  }
  updateThemeIcon();
}
function applyThemeColors(dark) {
  const root = document.documentElement;
  if (dark) {
    root.style.setProperty('--bg',      '#1c1c1a');
    root.style.setProperty('--bg2',     '#252523');
    root.style.setProperty('--bg3',     '#2e2e2b');
    root.style.setProperty('--text',    '#f0efe9');
    root.style.setProperty('--text2',   '#a8a8a3');
    root.style.setProperty('--text3',   '#6b6b67');
    root.style.setProperty('--border',  'rgba(255,255,255,0.12)');
    root.style.setProperty('--border2', 'rgba(255,255,255,0.22)');
  } else {
    root.style.setProperty('--bg',      '#ffffff');
    root.style.setProperty('--bg2',     '#f7f7f5');
    root.style.setProperty('--bg3',     '#f0efe9');
    root.style.setProperty('--text',    '#1a1a18');
    root.style.setProperty('--text2',   '#6b6b67');
    root.style.setProperty('--text3',   '#9b9b96');
    root.style.setProperty('--border',  'rgba(0,0,0,0.12)');
    root.style.setProperty('--border2', 'rgba(0,0,0,0.22)');
  }
}
function updateThemeIcon() {
  const isDark = document.documentElement.classList.contains('dark') ||
    (!document.documentElement.classList.contains('light') && window.matchMedia('(prefers-color-scheme: dark)').matches);
  document.getElementById('theme-icon').className = isDark ? 'ti ti-sun' : 'ti ti-moon';
}
initTheme();

// ── Clock mode ────────────────────────────────────────────
function toggleClock() {
  offClock = !offClock;
  localStorage.setItem('offClock', offClock);
  applyClockMode();
}
function applyClockMode() {
  const ci = document.getElementById('clock-icon'); ci.className = offClock ? 'ti ti-beach' : 'ti ti-building';
  document.getElementById('clock-btn').classList.toggle('off-clock', offClock);
  // Show/hide outreach vs errands panel
  const outreachPanel = document.getElementById('outreach-panel');
  const errandsPanel  = document.getElementById('errands-panel');
  if (outreachPanel) outreachPanel.style.display = offClock ? 'none' : 'block';
  if (errandsPanel)  errandsPanel.style.display  = offClock ? 'block' : 'none';
  // Re-render tasks (filters out work items in off-clock mode)
  render();
  if (offClock) renderErrands();
  else renderOutreach();
}

// ── Script URL ────────────────────────────────────────────
function saveScriptUrl() {
  const url = document.getElementById('script-url-input').value.trim();
  if (!url) return;
  localStorage.setItem('scriptUrl', url);
  scriptUrl = url;
  document.getElementById('setup-banner').style.display = 'none';
  loadItems();
  loadOutreach();
}

// ── Data helpers ──────────────────────────────────────────
function normalize(r) {
  const cat = String(r.cat || '3').trim();
  const added = (r.added || '');
  const addedClean = /\d{4}-\d{2}-\d{2}/.test(added) ? added.slice(0,10) : '';
  return {
    id:       Number(r.id),
    name:     r.name  || '',
    cat:      ['1','2','3','4'].includes(cat) ? cat : '3',
    tag:      r.tag   || 'work',
    note:     r.note  || '',
    cleared:  r.cleared === true || String(r.cleared).toUpperCase() === 'TRUE',
    added:    addedClean,
    pri:      String(r.pri != null && r.pri !== '' ? r.pri : '2'),
    deadline: r.deadline || '',
    starred:  r.starred === true || String(r.starred).toUpperCase() === 'TRUE',
    archived: r.archived === true || String(r.archived).toUpperCase() === 'TRUE',
  };
}

function setSyncStatus(msg, cls) {
  const el = document.getElementById('sync-status');
  el.textContent = msg;
  el.className = 'sync-status ' + (cls || '');
}

async function loadItems() {
  if (!scriptUrl) {
    document.getElementById('setup-banner').style.display = 'block';
    return;
  }
  setSyncStatus('Loading…');
  try {
    const res = await fetch(scriptUrl + '?action=get');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    const arr = Array.isArray(data) ? data : (data.items || []);
    items = arr.map(normalize).filter(i => !i.archived);
    localStorage.setItem('itemsCache', JSON.stringify(items));
    setSyncStatus('Synced', 'sync-ok');
    render();
  } catch(e) {
    const cached = localStorage.getItem('itemsCache');
    if (cached) {
      items = JSON.parse(cached);
      setSyncStatus('Sync failed (' + e.message + ') — showing cached data', 'sync-err');
      render();
    } else {
      setSyncStatus('Could not connect: ' + e.message, 'sync-err');
    }
  }
}

async function apiPost(payload) {
  try {
    await fetch(scriptUrl, { method: 'POST', body: JSON.stringify(payload) });
    localStorage.setItem('itemsCache', JSON.stringify(items));
  } catch(e) {
    setSyncStatus('Sync failed — saved locally', 'sync-err');
    localStorage.setItem('itemsCache', JSON.stringify(items));
  }
}

// ── Actions ───────────────────────────────────────────────
async function addItem() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) return;
  const id = Date.now();
  const item = {
    id, name,
    cat:      document.getElementById('f-cat').value,
    tag:      document.getElementById('f-tag').value,
    note:     '',
    cleared:  false,
    added:    new Date().toISOString().slice(0,10),
    pri:      document.getElementById('f-pri').value,
    deadline: '',
    starred:  false,
    archived: false,
  };
  items.unshift(item);
  document.getElementById('f-name').value = '';
  render();
  await apiPost({ action: 'add', item });
}

async function toggle(id, e) {
  e.stopPropagation();
  const item = items.find(i => i.id === id);
  if (!item) return;
  item.cleared = !item.cleared;
  render();
  await apiPost({ action: 'update', item });
}

async function del(id, e) {
  e.stopPropagation();
  items = items.filter(i => i.id !== id);
  if (expandedId === id) expandedId = null;
  render();
  await apiPost({ action: 'delete', id });
}

async function archiveAllCleared() {
  const toArchive = items.filter(i => i.cleared);
  if (!toArchive.length) return;
  toArchive.forEach(i => { i.archived = true; });
  items = items.filter(i => !i.cleared);
  expandedId = null;
  render();
  for (const item of toArchive) {
    await apiPost({ action: 'update', item });
  }
}

async function changePri(id, dir, e) {
  e.stopPropagation();
  const item = items.find(i => i.id === id);
  if (!item) return;
  const cur = parseInt(item.pri || '2');
  item.pri = dir === 'up' ? String(Math.max(0, cur-1)) : String(Math.min(3, cur+1));
  render();
  await apiPost({ action: 'update', item });
}

function selectPri(id, val) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  item.pri = val;
  // update selector display inline
  const container = document.getElementById('edit-pri-' + id);
  if (container) {
    container.querySelectorAll('.pri-opt').forEach(o => {
      o.className = 'pri-opt' + (o.dataset.val === val ? ' selected ' + PRI[val].selCls : '');
    });
  }
}

async function toggleStar(id, e) {
  e.stopPropagation();
  const item = items.find(i => i.id === id);
  if (!item) return;
  item.starred = !item.starred;
  render();
  await apiPost({ action: 'update', item });
}

function toggleExpand(id, e) {
  if (e.target.closest('.chk') || e.target.closest('.del-btn') || e.target.closest('.pri-btn') || e.target.closest('.star-btn')) return;
  expandedId = (expandedId === id) ? null : id;
  render();
}

function cancelEdit() {
  expandedId = null;
  render();
}

async function saveEdit(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  item.name    = document.getElementById('edit-name-' + id).value.trim() || item.name;
  item.cat     = document.getElementById('edit-cat-'  + id).value;
  item.tag     = document.getElementById('edit-tag-'  + id).value;
  item.note    = document.getElementById('edit-note-' + id).value.trim();
  // pri already updated in-place via selectPri
  expandedId = null;
  render();
  await apiPost({ action: 'update', item });
}

// ── Filters ───────────────────────────────────────────────
function togglePill(pill) {
  catFilter = null;
  if (pill === 'all') {
    activePills = new Set(['all']);
  } else {
    activePills.delete('all');
    if (activePills.has(pill)) activePills.delete(pill);
    else activePills.add(pill);
    if (!activePills.size) activePills.add('all');
  }
  updateFilterUI();
  render();
}

function setStatFilter(cat) {
  if (catFilter === cat) {
    catFilter = null;
    activePills = new Set(['all']);
  } else {
    catFilter = cat;
    activePills = new Set();
  }
  updateFilterUI();
  render();
}

function updateFilterUI() {
  document.querySelectorAll('[data-pill]').forEach(el => {
    el.classList.toggle('active', activePills.has(el.dataset.pill));
  });
  document.querySelectorAll('.stat').forEach(el => {
    el.classList.toggle('active-stat', el.id === 'stat-' + catFilter);
  });
}

function visible() {
  return items.filter(i => {
    if (offClock && i.tag === 'work') return false;
    if (catFilter) return i.cat === catFilter;
    const all  = activePills.has('all');
    const work = activePills.has('work');
    const pers = activePills.has('personal');
    const pri  = activePills.has('prioritized');
    const star = activePills.has('starred');

    let pass = all;
    if (!pass && (work || pers)) {
      if (work && i.tag === 'work')     pass = true;
      if (pers && i.tag === 'personal') pass = true;
    }
    if (!pass && !work && !pers && (pri || star)) pass = true;
    if (work || pers) pass = pass; // already filtered

    // Secondary filters
    if (pri  && !(parseInt(i.pri || '2') < 2)) return false;
    if (star && !i.starred)                    return false;

    return pass;
  });
}

function sortItems(arr) {
  return [...arr].sort((a, b) => {
    const pa = parseInt(a.pri || '2'), pb = parseInt(b.pri || '2');
    // Starred first, then by priority, then by id (newest first)
    const sa = a.starred ? 0 : 1, sb = b.starred ? 0 : 1;
    if (sa !== sb) return sa - sb;
    if (pa !== pb) return pa - pb;
    return b.id - a.id;
  });
}

// ── Render ────────────────────────────────────────────────
function render() {
  // Stats
  const counts = { '1':0, '2':0, '3':0, '4':0 };
  items.filter(i => !i.cleared).forEach(i => { if (counts[i.cat] !== undefined) counts[i.cat]++; });
  // Show archive-all button only when cleared items exist
  const archiveBtn = document.getElementById('archive-all-btn');
  if (archiveBtn) archiveBtn.style.display = items.some(i => i.cleared) ? 'inline-block' : 'none';
  document.getElementById('stats').innerHTML = CAT_ORDER.map(k => {
    const c = CATS[k];
    return `<div class="stat ${c.statCls} ${catFilter===k ? 'active-stat' : ''}" id="stat-${k}"
      onclick="setStatFilter('${k}')" role="button" tabindex="0"
      onkeydown="if(event.key==='Enter')setStatFilter('${k}')">
      <div class="stat-num">${counts[k]}</div>
      <div class="stat-lbl">${c.short}</div>
    </div>`;
  }).join('');

  updateFilterUI();

  const vis = visible();
  const listEl = document.getElementById('list');
  if (!vis.length) { listEl.innerHTML = '<div class="empty">Nothing here</div>'; return; }

  let html = '';
  if (catFilter) {
    sortItems(vis).forEach(i => { html += itemHTML(i); });
  } else {
    // If starred filter is active alone or combined, flat list sorted by star→pri
    const starOnly = activePills.has('starred') && !activePills.has('prioritized') && !activePills.has('work') && !activePills.has('personal');
    if (starOnly || (activePills.has('starred') && activePills.size <= 2)) {
      sortItems(vis).forEach(i => { html += itemHTML(i); });
    } else {
      // Group by category
      CAT_ORDER.forEach(k => {
        const group = vis.filter(i => i.cat === k);
        if (!group.length) return;
        const c = CATS[k];
        html += `<div class="section-hdr"><span class="dot ${c.dot}"></span>${c.label}</div>`;
        sortItems(group).forEach(i => { html += itemHTML(i); });
      });
    }
  }
  // Inject outreach items into Today / Prioritized views
  const ovis = visibleOutreach();
  if (ovis.length) {
    let ohtml = '';
    if (activePills.has('starred') || activePills.has('prioritized')) {
      ohtml = ovis.map(outreachItemHTML).join('');
    }
    if (!vis.length) {
      listEl.innerHTML = ohtml || '<div class="empty">Nothing here</div>';
    } else {
      listEl.innerHTML = html + ohtml;
    }
  } else {
    listEl.innerHTML = html;
  }
}

// ── Pomodoro ──────────────────────────────────────────────
let pomoSecs = 25*60, pomoRunning = false, pomoInterval = null, pomoDuration = 25;

// ── Focus tracking ───────────────────────────────────────
// Sessions stored as array of {mins, duration} per day
function todayKey()    { return 'focusSessions_' + new Date().toISOString().slice(0,10); }
function getSessions() { try { return JSON.parse(localStorage.getItem(todayKey()) || '[]'); } catch(e) { return []; } }

// Called when a timer completes or is paused — records actual elapsed minutes
let sessionStartSecs = null; // tracks seconds at last session start

function startFocusSession() {
  sessionStartSecs = pomoSecs;
}
function endFocusSession() {
  if (sessionStartSecs === null) return;
  const elapsed = Math.round((sessionStartSecs - pomoSecs) / 60);
  if (elapsed > 0) {
    const sessions = getSessions();
    sessions.push({ mins: elapsed, duration: pomoDuration });
    localStorage.setItem(todayKey(), JSON.stringify(sessions));
    updateFocusDisplay();
  }
  sessionStartSecs = null;
}

function saveFocusGoal() {
  const val = parseInt(document.getElementById('focus-goal-input').value);
  if (!isNaN(val) && val > 0) {
    localStorage.setItem('focusGoalMins', String(val));
    updateFocusDisplay();
  }
}
function resetFocusDay() {
  localStorage.removeItem(todayKey());
  updateFocusDisplay();
}

function updateFocusDisplay() {
  const sessions = getSessions();
  const goal = parseInt(localStorage.getItem('focusGoalMins') || '120');
  document.getElementById('focus-goal-input').value = goal;

  const totalMins = sessions.reduce((s, x) => s + x.mins, 0);
  const h = Math.floor(totalMins / 60), m = totalMins % 60;
  const totalLabel = (h > 0 ? h + 'h ' : '') + m + 'm focus today';
  document.getElementById('focus-total-display').textContent = totalLabel;

  // Build chunked bar
  const wrap = document.getElementById('focus-chunks');
  const wrapWidth = wrap.parentElement.offsetWidth || 300;
  const pxPerMin = wrapWidth / goal; // goal fills 100% of bar

  wrap.innerHTML = sessions.map(s => {
    const w = Math.min(s.mins * pxPerMin - 2, wrapWidth);
    const color = s.duration === 15 ? '#60a5fa'
                : s.duration === 25 ? '#3A9E6C'
                : '#8b5cf6'; // 45min
    return `<div class="focus-chunk" style="width:${Math.max(4,w)}px;background:${color}" title="${s.mins}m session"></div>`;
  }).join('');

  // Goal line at 100% (right edge of goal area — stays hidden if over)
  const goalLine = document.getElementById('focus-goal-line');
  goalLine.style.display = totalMins < goal ? 'block' : 'none';
  goalLine.style.left = '100%'; // always at right edge since bar = goal width

  // Legend
  const durations = [...new Set(sessions.map(s => s.duration))].sort((a,b)=>a-b);
  const colors = { 15: '#60a5fa', 25: '#3A9E6C', 45: '#8b5cf6' };
  const legendItems = durations.map(d =>
    `<span class="focus-legend-item"><span class="focus-legend-swatch" style="background:${colors[d]||'#3A9E6C'}"></span>${d}min sessions</span>`
  );
  if (sessions.length) {
    legendItems.push(`<span class="focus-legend-item" style="margin-left:auto">${Math.round((totalMins/goal)*100)}% of goal</span>`);
  }
  document.getElementById('focus-legend').innerHTML = legendItems.join('') || '<span>Start a session to track focus time</span>';
}

function setDuration(min) {
  if (pomoRunning) return;
  pomoDuration = min;
  pomoSecs = min * 60;
  document.querySelectorAll('.pomo-preset').forEach(b => b.classList.toggle('active', b.textContent.includes(min)));
  updatePomoDisplay();
  updatePomoBar();
}
function pomoToggle() {
  if (pomoRunning) {
    clearInterval(pomoInterval);
    pomoRunning = false;
    endFocusSession();
    document.getElementById('pomo-start').textContent = 'Start';
    document.getElementById('pomo-status').textContent = 'Paused';
  } else {
    if (pomoSecs <= 0) pomoSecs = pomoDuration * 60;
    pomoRunning = true;
    startFocusSession();
    document.getElementById('pomo-start').textContent = 'Pause';
    document.getElementById('pomo-status').textContent = 'Running';
    pomoInterval = setInterval(() => {
      pomoSecs--;
      updatePomoDisplay();
      updatePomoBar();
      if (pomoSecs <= 0) {
        clearInterval(pomoInterval);
        pomoRunning = false;
        endFocusSession();
        document.getElementById('pomo-start').textContent = 'Start';
        document.getElementById('pomo-status').textContent = 'Done! 🎉';
      }
    }, 1000);
  }
}
function pomoReset() {
  clearInterval(pomoInterval);
  pomoRunning = false;
  pomoSecs = pomoDuration * 60;
  document.getElementById('pomo-start').textContent = 'Start';
  document.getElementById('pomo-status').textContent = 'Ready';
  updatePomoDisplay();
  updatePomoBar();
}
function updatePomoDisplay() {
  const m = Math.floor(pomoSecs/60), s = pomoSecs%60;
  document.getElementById('pomo-display').textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}
function updatePomoBar() {
  const pct = (pomoSecs / (pomoDuration * 60)) * 100;
  document.getElementById('pomo-bar').style.width = pct + '%';
  const bar = document.getElementById('pomo-bar');
  if (pct > 50)      bar.style.background = '#3A9E6C';
  else if (pct > 20) bar.style.background = '#C47D24';
  else               bar.style.background = '#D94848';
}


// ── Outreach ──────────────────────────────────────────────
let outreachItems = [];
let outreachTypeFilter = 'all';
let outreachCollapsed = false;

// Energy cycling: 0=neutral(gray) 1=risk(red) 2=energizing(green) 3=draining(amber)
// stored as cat string matching item cats: '3'=neutral,'1'=risk,'2'=enrg,'4'=drain
const O_CAT_CYCLE = ['3','1','2','4'];
const O_CAT_DOT   = { '1':'e1','2':'e2','3':'e3','4':'e4' };
const O_CAT_ACC   = { '1':'acc-risk','2':'acc-enrg','3':'acc-neut','4':'acc-drai' };
const O_PRI_BADGE = { '0':{ badge:'!!', cls:'pri-top' }, '1':{ badge:'!', cls:'pri-high' }, '2':{ badge:'', cls:'' }, '3':{ badge:'↓', cls:'pri-low' } };

function normalizeOutreach(r) {
  return {
    id:       Number(r.id),
    name:     r.name || '',
    type:     r.type || 'call',
    cat:      String(r.cat || '3'),
    pri:      String(r.pri != null && r.pri !== '' ? r.pri : '2'),
    starred:  r.starred === true || String(r.starred).toUpperCase() === 'TRUE',
    done:     r.done === true || String(r.done).toUpperCase() === 'TRUE',
    archived: r.archived === true || String(r.archived).toUpperCase() === 'TRUE',
    added:    (r.added || '').slice(0,10),
  };
}

async function loadOutreach() {
  if (!scriptUrl) return;
  try {
    const res = await fetch(scriptUrl + '?action=getOutreach');
    if (!res.ok) return;
    const data = await res.json();
    const arr = Array.isArray(data) ? data : (data.items || []);
    outreachItems = arr.map(normalizeOutreach).filter(o => !o.archived);
    localStorage.setItem('outreachCache', JSON.stringify(outreachItems));
    renderOutreach();
  } catch(e) {
    const cached = localStorage.getItem('outreachCache');
    if (cached) { outreachItems = JSON.parse(cached); renderOutreach(); }
  }
}

async function outreachPost(payload) {
  try {
    await fetch(scriptUrl, { method: 'POST', body: JSON.stringify(payload) });
    localStorage.setItem('outreachCache', JSON.stringify(outreachItems));
  } catch(e) {
    localStorage.setItem('outreachCache', JSON.stringify(outreachItems));
  }
}

function toggleOutreach() {
  outreachCollapsed = !outreachCollapsed;
  document.getElementById('outreach-panel').classList.toggle('collapsed', outreachCollapsed);
}

function setOutreachType(t) {
  outreachTypeFilter = t;
  document.querySelectorAll('.outreach-type-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('otype-' + t).classList.add('active');
  renderOutreach();
}

async function addOutreach() {
  const raw = document.getElementById('o-name').value.trim();
  if (!raw) return;
  const type = document.getElementById('o-type').value;
  const names = raw.split(/[,\u000a]+/).map(s => s.trim()).filter(Boolean);
  for (const name of names) {
    const item = { id: Date.now() + Math.random(), name, type, cat:'3', pri:'2', starred:false, done:false, archived:false, added: new Date().toISOString().slice(0,10) };
    item.id = Math.floor(item.id);
    outreachItems.unshift(item);
    await outreachPost({ action: 'addOutreach', item });
  }
  document.getElementById('o-name').value = '';
  renderOutreach();
}

async function toggleOutreachDone(id, e) {
  e.stopPropagation();
  const o = outreachItems.find(x => x.id === id);
  if (!o) return;
  o.done = !o.done;
  renderOutreach();
  await outreachPost({ action: 'updateOutreach', item: o });
}

async function cycleOutreachCat(id, e) {
  e.stopPropagation();
  const o = outreachItems.find(x => x.id === id);
  if (!o) return;
  const idx = O_CAT_CYCLE.indexOf(o.cat);
  o.cat = O_CAT_CYCLE[(idx + 1) % O_CAT_CYCLE.length];
  renderOutreach();
  await outreachPost({ action: 'updateOutreach', item: o });
}

async function toggleOutreachStar(id, e) {
  e.stopPropagation();
  const o = outreachItems.find(x => x.id === id);
  if (!o) return;
  o.starred = !o.starred;
  renderOutreach();
  await outreachPost({ action: 'updateOutreach', item: o });
}

async function cycleOutreachType(id, e) {
  e.stopPropagation();
  const o = outreachItems.find(x => x.id === id);
  if (!o) return;
  const cycle = ['call','email','linkedin'];
  const idx = cycle.indexOf(o.type);
  o.type = cycle[(idx + 1) % cycle.length];
  renderOutreach();
  await outreachPost({ action: 'updateOutreach', item: o });
}

async function changeOutreachPri(id, dir, e) {
  e.stopPropagation();
  const o = outreachItems.find(x => x.id === id);
  if (!o) return;
  const cur = parseInt(o.pri || '2');
  o.pri = dir === 'up' ? String(Math.max(0, cur-1)) : String(Math.min(3, cur+1));
  renderOutreach();
  await outreachPost({ action: 'updateOutreach', item: o });
}

async function deleteOutreach(id, e) {
  e.stopPropagation();
  outreachItems = outreachItems.filter(x => x.id !== id);
  renderOutreach();
  await outreachPost({ action: 'deleteOutreach', id });
}

async function archiveOutreach() {
  const toArchive = outreachItems.filter(o => o.done);
  toArchive.forEach(o => { o.archived = true; });
  outreachItems = outreachItems.filter(o => !o.done);
  renderOutreach();
  for (const o of toArchive) {
    await outreachPost({ action: 'updateOutreach', item: o });
  }
}

function editOutreachName(id, e) {
  e.stopPropagation();
  const o = outreachItems.find(x => x.id === id);
  if (!o || o.done) return;
  const span = document.getElementById('oname-' + id);
  if (!span) return;
  const input = document.createElement('input');
  input.className = 'outreach-name-input';
  input.value = o.name;
  span.replaceWith(input);
  input.focus();
  input.select();
  async function save() {
    const val = input.value.trim();
    if (val) o.name = val;
    renderOutreach();
    if (val) await outreachPost({ action: 'updateOutreach', item: o });
  }
  input.addEventListener('blur', save);
  input.addEventListener('keydown', function(ev) {
    if (ev.key === 'Enter') { ev.preventDefault(); input.blur(); }
    if (ev.key === 'Escape') { o.name = o.name; renderOutreach(); }
    ev.stopPropagation();
  });
}

function renderOutreach() {
  const active = outreachItems.filter(o => !o.done);
  const done   = outreachItems.filter(o => o.done);
  const vis    = outreachTypeFilter === 'all' ? outreachItems
               : outreachItems.filter(o => o.type === outreachTypeFilter);

  // Count badge
  const activeCount = active.filter(o => outreachTypeFilter === 'all' || o.type === outreachTypeFilter).length;
  document.getElementById('outreach-count').textContent = activeCount + ' remaining';

  // Done footer
  const doneCount = done.filter(o => outreachTypeFilter === 'all' || o.type === outreachTypeFilter).length;
  document.getElementById('outreach-done-count').textContent = doneCount > 0 ? doneCount + ' done today' : '';
  document.getElementById('outreach-archive-btn').style.display = done.length > 0 ? 'inline-block' : 'none';

  // Sort: starred first, then by pri, then active before done
  const sorted = [...vis].sort((a, b) => {
    if (a.done !== b.done) return a.done ? 1 : -1;
    if (a.starred !== b.starred) return a.starred ? -1 : 1;
    return parseInt(a.pri||'2') - parseInt(b.pri||'2');
  });

  if (!sorted.length) {
    document.getElementById('outreach-list').innerHTML = '<div class="outreach-empty">No outreach yet — add names above</div>';
    return;
  }

  document.getElementById('outreach-list').innerHTML = sorted.map(o => {
    const pri = o.pri || '2';
    const pb  = O_PRI_BADGE[pri];
    const priBadge = pb && pb.badge ? `<span class="outreach-pri-badge ${pb.cls}">${pb.badge}</span>` : '';
    const upActive   = parseInt(pri) < 2 ? 'active' : '';
    const downActive = parseInt(pri) > 2 ? 'active' : '';
    const dotCls = O_CAT_DOT[o.cat] || 'e3';
    const typeIcon = o.type === 'email' ? 'ti-mail' : o.type === 'linkedin' ? 'ti-brand-linkedin' : 'ti-phone';
    const typeTitle = o.type === 'email' ? 'Email' : o.type === 'linkedin' ? 'LinkedIn' : 'Call';
    return `<div class="outreach-row">
      <div class="outreach-chk ${o.done ? 'done' : ''}" onclick="toggleOutreachDone(${o.id}, event)">
        ${o.done ? '<i class="ti ti-check"></i>' : ''}
      </div>
      <div class="e-dot ${dotCls}" onclick="cycleOutreachCat(${o.id}, event)" title="Tap to set energy type"></div>
      <i class="ti ${typeIcon} outreach-icon" onclick="cycleOutreachType(${o.id}, event)" style="cursor:pointer" title="Tap to change type (${typeTitle})" aria-hidden="true"></i>
      <span class="outreach-name ${o.done ? 'done' : ''}" id="oname-${o.id}" onclick="editOutreachName(${o.id}, event)" title="Tap to edit">${o.name}</span>
      ${priBadge}
      <button class="outreach-star ${o.starred ? 'on' : ''}" onclick="toggleOutreachStar(${o.id}, event)" title="Star for today">★</button>
      <div class="outreach-pri-btns">
        <button class="outreach-pri-btn ${upActive}"   onclick="changeOutreachPri(${o.id},'up',event)">▲</button>
        <button class="outreach-pri-btn ${downActive}" onclick="changeOutreachPri(${o.id},'down',event)">▼</button>
      </div>
      <button class="outreach-del" onclick="deleteOutreach(${o.id}, event)" aria-label="Remove"><i class="ti ti-x"></i></button>
    </div>`;
  }).join('');

  // Also re-render task list so Today filter picks up outreach stars
  // (only if we're in starred/prioritized view)
  if (activePills.has('starred') || activePills.has('prioritized')) render();
}

// Return outreach items visible in current task filter (for Today / Prioritized views)
function visibleOutreach() {
  const star = activePills.has('starred');
  const pri  = activePills.has('prioritized');
  if (!star && !pri && !catFilter) return [];
  return outreachItems.filter(o => {
    if (o.done) return false;
    if (catFilter && o.cat !== catFilter) return false;
    if (star && !o.starred) return false;
    if (pri && parseInt(o.pri||'2') >= 2) return false;
    return true;
  });
}

function outreachItemHTML(o) {
  const pri = o.pri || '2';
  const pb  = O_PRI_BADGE[pri];
  const priBadge = pb && pb.badge ? `<span class="pri-badge ${pb.cls}">${pb.badge}</span>` : '';
  const dotCls = O_CAT_DOT[o.cat] || 'e3';
  const accCls = O_CAT_ACC[o.cat] || 'acc-neut';
  const typeIcon = o.type === 'email' ? 'ti-mail' : o.type === 'linkedin' ? 'ti-brand-linkedin' : 'ti-phone';
  return `<div class="item ${accCls} ${o.starred ? 'starred-item' : ''}">
    <div class="item-row" style="cursor:default">
      <div class="outreach-chk ${o.done ? 'done' : ''}" onclick="toggleOutreachDone(${o.id}, event)">
        ${o.done ? '<i class="ti ti-check"></i>' : ''}
      </div>
      <div class="item-body">
        <div class="item-name" style="display:flex;align-items:center;gap:6px">
          <i class="ti ${typeIcon}" style="font-size:13px;color:var(--text2)" aria-hidden="true"></i>
          ${o.name}
        </div>
        <div class="item-meta">
          <span class="badge bwork" style="text-transform:none;letter-spacing:0">Contact</span>
          ${priBadge}
        </div>
      </div>
      <button class="outreach-star ${o.starred ? 'on' : ''}" onclick="toggleOutreachStar(${o.id}, event)" title="Star for today" style="font-size:18px;padding:2px 4px;background:none;border:none;cursor:pointer;color:${o.starred ? '#f59e0b' : 'var(--border2)'}">★</button>
    </div>
  </div>`;
}


// ── Errands ──────────────────────────────────────────────
let errandsItems = [];
let errandsCollapsed = false;

function normalizeErrand(r) {
  return {
    id:       Number(r.id),
    name:     r.name || '',
    pri:      String(r.pri != null && r.pri !== '' ? r.pri : '2'),
    starred:  r.starred === true || String(r.starred).toUpperCase() === 'TRUE',
    done:     r.done    === true || String(r.done).toUpperCase()    === 'TRUE',
    archived: r.archived === true || String(r.archived).toUpperCase() === 'TRUE',
    added:    (r.added || '').slice(0,10),
  };
}

async function loadErrands() {
  if (!scriptUrl) return;
  try {
    const res = await fetch(scriptUrl + '?action=getErrands');
    if (!res.ok) return;
    const data = await res.json();
    const arr = Array.isArray(data) ? data : (data.items || []);
    errandsItems = arr.map(normalizeErrand).filter(e => !e.archived);
    localStorage.setItem('errandsCache', JSON.stringify(errandsItems));
    renderErrands();
  } catch(err) {
    const cached = localStorage.getItem('errandsCache');
    if (cached) { errandsItems = JSON.parse(cached); renderErrands(); }
  }
}

async function errandsPost(payload) {
  try {
    await fetch(scriptUrl, { method: 'POST', body: JSON.stringify(payload) });
    localStorage.setItem('errandsCache', JSON.stringify(errandsItems));
  } catch(e) {
    localStorage.setItem('errandsCache', JSON.stringify(errandsItems));
  }
}

function toggleErrands() {
  errandsCollapsed = !errandsCollapsed;
  document.getElementById('errands-panel').classList.toggle('collapsed', errandsCollapsed);
}

async function addErrands() {
  const raw = document.getElementById('e-name').value.trim();
  if (!raw) return;
  const names = raw.split(/[,\u000a]+/).map(s => s.trim()).filter(Boolean);
  for (const name of names) {
    const item = { id: Math.floor(Date.now() + Math.random()*1000), name, pri:'2', starred:false, done:false, archived:false, added: new Date().toISOString().slice(0,10) };
    errandsItems.unshift(item);
    await errandsPost({ action: 'addErrand', item });
  }
  document.getElementById('e-name').value = '';
  renderErrands();
}

async function toggleErrandDone(id, e) {
  e.stopPropagation();
  const o = errandsItems.find(x => x.id === id);
  if (!o) return;
  o.done = !o.done;
  renderErrands();
  await errandsPost({ action: 'updateErrand', item: o });
}

async function toggleErrandStar(id, e) {
  e.stopPropagation();
  const o = errandsItems.find(x => x.id === id);
  if (!o) return;
  o.starred = !o.starred;
  renderErrands();
  await errandsPost({ action: 'updateErrand', item: o });
}

async function changeErrandPri(id, dir, e) {
  e.stopPropagation();
  const o = errandsItems.find(x => x.id === id);
  if (!o) return;
  const cur = parseInt(o.pri || '2');
  o.pri = dir === 'up' ? String(Math.max(0, cur-1)) : String(Math.min(3, cur+1));
  renderErrands();
  await errandsPost({ action: 'updateErrand', item: o });
}

async function deleteErrand(id, e) {
  e.stopPropagation();
  errandsItems = errandsItems.filter(x => x.id !== id);
  renderErrands();
  await errandsPost({ action: 'deleteErrand', id });
}

async function archiveErrands() {
  const toArchive = errandsItems.filter(o => o.done);
  toArchive.forEach(o => { o.archived = true; });
  errandsItems = errandsItems.filter(o => !o.done);
  renderErrands();
  for (const o of toArchive) await errandsPost({ action: 'updateErrand', item: o });
}

function editErrandName(id, e) {
  e.stopPropagation();
  const o = errandsItems.find(x => x.id === id);
  if (!o || o.done) return;
  const span = document.getElementById('ename-' + id);
  if (!span) return;
  const input = document.createElement('input');
  input.className = 'errands-name-input';
  input.value = o.name;
  span.replaceWith(input);
  input.focus(); input.select();
  async function save() {
    const val = input.value.trim();
    if (val) o.name = val;
    renderErrands();
    if (val) await errandsPost({ action: 'updateErrand', item: o });
  }
  input.addEventListener('blur', save);
  input.addEventListener('keydown', function(ev) {
    if (ev.key === 'Enter') { ev.preventDefault(); input.blur(); }
    if (ev.key === 'Escape') { renderErrands(); }
    ev.stopPropagation();
  });
}

function renderErrands() {
  if (!offClock) return;
  const active = errandsItems.filter(o => !o.done);
  const done   = errandsItems.filter(o => o.done);

  document.getElementById('errands-count').textContent = active.length + ' remaining';
  document.getElementById('errands-done-count').textContent = done.length > 0 ? done.length + ' done today' : '';
  document.getElementById('errands-archive-btn').style.display = done.length > 0 ? 'inline-block' : 'none';

  const sorted = [...errandsItems].sort((a,b) => {
    if (a.done !== b.done) return a.done ? 1 : -1;
    if (a.starred !== b.starred) return a.starred ? -1 : 1;
    return parseInt(a.pri||'2') - parseInt(b.pri||'2');
  });

  if (!sorted.length) {
    document.getElementById('errands-list').innerHTML = '<div class="errands-empty">No errands yet — add above</div>';
    return;
  }

  document.getElementById('errands-list').innerHTML = sorted.map(o => {
    const pri = o.pri || '2';
    const pb  = O_PRI_BADGE[pri];
    const priBadge = pb && pb.badge ? `<span class="outreach-pri-badge ${pb.cls}">${pb.badge}</span>` : '';
    const upActive   = parseInt(pri) < 2 ? 'active' : '';
    const downActive = parseInt(pri) > 2 ? 'active' : '';
    return `<div class="errands-row">
      <div class="errands-chk ${o.done ? 'done' : ''}" onclick="toggleErrandDone(${o.id}, event)">
        ${o.done ? '<i class="ti ti-check"></i>' : ''}
      </div>
      <span class="errands-name ${o.done ? 'done' : ''}" id="ename-${o.id}" onclick="editErrandName(${o.id}, event)">${o.name}</span>
      ${priBadge}
      <button class="errands-star ${o.starred ? 'on' : ''}" onclick="toggleErrandStar(${o.id}, event)" title="Star for today">★</button>
      <div class="errands-pri-btns">
        <button class="errands-pri-btn ${upActive}"   onclick="changeErrandPri(${o.id},'up',event)">▲</button>
        <button class="errands-pri-btn ${downActive}" onclick="changeErrandPri(${o.id},'down',event)">▼</button>
      </div>
      <button class="errands-del" onclick="deleteErrand(${o.id}, event)" aria-label="Remove"><i class="ti ti-x"></i></button>
    </div>`;
  }).join('');
}

// ── Init ──────────────────────────────────────────────────
document.getElementById('f-name').addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });
document.getElementById('o-name').addEventListener('keydown', e => { if (e.key === 'Enter') addOutreach(); });
document.getElementById('e-name').addEventListener('keydown', e => { if (e.key === 'Enter') addErrands(); });
updateFocusDisplay();
// re-render focus bar after layout settles so widths are correct
setTimeout(updateFocusDisplay, 100);
applyClockMode();
loadItems();
loadOutreach();
loadErrands();
</script>
</body>
</html>
