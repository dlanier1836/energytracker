function visible() {
  const now = new Date();
  return items.filter(i => {
    if (i.remission) return false;
    if (i.delegated && !searchQuery) return false;
    // Hide personal low priority in work mode
    if (!offClock && i.tag === 'personal' && (i.pri === '3') && !searchQuery) return false;
    // Snoozed items hidden unless searching
    if (i.snoozedUntil && !searchQuery) {
      const snoozeDate = new Date(i.snoozedUntil);
      if (snoozeDate > now) return false;
    }
    if (offClock && i.tag === 'work') return false;
    if (searchQuery && !i.name.toLowerCase().includes(searchQuery)) return false;
    if (activePills.has('revenue') && !i.revenue) return false;
    if (catFilter) return i.cat === catFilter;
    const all  = activePills.has('all');
    const work = activePills.has('work');
    const pers = activePills.has('personal');
    const pri  = activePills.has('prioritized');
    const star = activePills.has('starred');
    const rev  = activePills.has('revenue');

    let pass = all || rev; // revenue alone shows all items (filtered above by revenue flag)
    if (!pass && (work || pers)) {
      if (work && i.tag === 'work')     pass = true;
      if (pers && i.tag === 'personal') pass = true;
    }
    if (!pass && !work && !pers && (pri || star)) pass = true;

    // Secondary filters
    if (pri  && !(parseInt(i.pri || '2') < 2)) return false;
    if (star && !i.starred)                    return false;

    return pass;
  });
}

const CAT_SORT_ORDER = {'1':0,'2':1,'3':2,'4':3};
const TAG_SORT_ORDER = {'work':0,'personal':1};

function sortItems(arr) {
  return [...arr].sort((a, b) => {
    // Cleared always sinks to bottom
    if (a.cleared !== b.cleared) return a.cleared ? 1 : -1;
    const pa = parseInt(a.pri || '2'), pb = parseInt(b.pri || '2');
    const sa = a.starred ? 0 : 1, sb = b.starred ? 0 : 1;
    if (sa !== sb) return sa - sb;
    if (pa !== pb) return pa - pb;
    const ca = CAT_SORT_ORDER[a.cat] ?? 2, cb = CAT_SORT_ORDER[b.cat] ?? 2;
    if (ca !== cb) return ca - cb;
    const ta = TAG_SORT_ORDER[a.tag] ?? 1, tb = TAG_SORT_ORDER[b.tag] ?? 1;
    if (ta !== tb) return ta - tb;
    // Deadline nudge — items due within 3 days float up within same priority/cat/tag
    const da = a.deadline ? Math.round((new Date(a.deadline) - new Date()) / 86400000) : 999;
    const db = b.deadline ? Math.round((new Date(b.deadline) - new Date()) / 86400000) : 999;
    const urgA = da <= 3 ? 0 : 1, urgB = db <= 3 ? 0 : 1;
    if (urgA !== urgB) return urgA - urgB;
    return b.id - a.id;
  });
}

// Today view: group by priority tier with section headers
function renderTodayView(vis) {
  const PRI_LABELS = { '0':'!! Top priority', '1':'! High priority', '2':'Normal', '3':'↓ Low priority' };
  let html = '';
  const activeVis  = vis.filter(i => !i.cleared);
  const clearedVis = vis.filter(i =>  i.cleared);
  ['0','1','2','3'].forEach(p => {
    const group = activeVis.filter(i => (i.pri||'2') === p);
    if (!group.length) return;
    const sorted = group.slice().sort((a,b) => {
      if (a.cleared !== b.cleared) return a.cleared ? 1 : -1;
      const ca = CAT_SORT_ORDER[a.cat]??2, cb = CAT_SORT_ORDER[b.cat]??2;
      if (ca !== cb) return ca - cb;
      return (TAG_SORT_ORDER[a.tag]??1) - (TAG_SORT_ORDER[b.tag]??1);
    });
    html += `<div class="section-hdr" style="color:var(--text2)">${PRI_LABELS[p]}</div>`;
    sorted.forEach(i => { html += itemHTML(i); });
  });
  if (clearedVis && clearedVis.length) {
    html += '<div class="section-hdr" style="color:var(--text3)">✓ Cleared</div>';
    clearedVis.forEach(i => { html += itemHTML(i); });
  }
  return html;
}

// ── Render ────────────────────────────────────────────────
function render() {
  // Stats
  const counts = { '1':0, '2':0, '3':0, '4':0 };
  const todayStar = activePills.has('starred');
  items.filter(i => {
    if (i.cleared) return false;
    if (i.remission) return false;
    if (i.delegated) return false;
    if (offClock && i.tag === 'work') return false;
    if (todayStar && !i.starred) return false;
    return true;
  }).forEach(i => { if (counts[i.cat] !== undefined) counts[i.cat]++; });
  // Show archive-all button only when cleared items exist
  const archiveBtn = document.getElementById('archive-all-btn');
  if (archiveBtn) archiveBtn.style.display = (items.some(i => i.cleared) || archivedOutreachItems.length > 0) ? 'inline-block' : 'none';
  document.getElementById('stats').innerHTML = CAT_ORDER.map(k => {
    const c = CATS[k];
    const zeroRisk = k === '1' && counts[k] === 0;
    const extraStyle = zeroRisk
      ? 'background:#F0FBF5!important;border-color:#3A9E6C!important'
      : '';
    const numStyle = zeroRisk ? 'color:#1E6B46!important' : '';
    return `<div class="stat ${c.statCls} ${catFilter===k ? 'active-stat' : ''}" id="stat-${k}"
      onclick="setStatFilter('${k}')" role="button" tabindex="0"
      onkeydown="if(event.key==='Enter')setStatFilter('${k}')" style="${extraStyle}">
      <div class="stat-num" style="${numStyle}">${counts[k]}</div>
      <div class="stat-lbl" style="${numStyle}">${c.short}</div>
    </div>`;
  }).join('');

  updateFilterUI();

  const vis = visible();
  const listEl = document.getElementById('list');

  const isTodayView = activePills.has('starred') && !activePills.has('prioritized') && !activePills.has('work') && !activePills.has('personal');

  let html = '';
  if (catFilter) {
    sortItems(vis).forEach(i => { html += itemHTML(i); });
  } else if (isTodayView) {
    html = renderTodayView(vis);
  } else if (activePills.has('prioritized')) {
    html = renderTodayView(vis);
  } else {
    // Separate cleared from active — cleared pool at very bottom
    const activeVis  = vis.filter(i => !i.cleared);
    const clearedVis = vis.filter(i =>  i.cleared);
    // Group active by category
    CAT_ORDER.forEach(k => {
      const group = activeVis.filter(i => i.cat === k);
      const c = CATS[k];
      if (group.length) {
        html += `<div class="section-hdr"><span class="dot ${c.dot}"></span>${c.label}</div>`;
        sortItems(group).forEach(i => { html += itemHTML(i); });
      }
      // After Risk group: Remission, then Delegated panel
      if (k === '1') {
        html += '<div id="delegated-anchor"></div>';
        html += remissionPanelHTML();
      }
    });
    // All cleared items at the very bottom
    if (clearedVis.length) {
      html += '<div class="section-hdr" style="color:var(--text3)">✓ Cleared</div>';
      clearedVis.forEach(i => { html += itemHTML(i); });
    }
  }

  const combined = html;
  listEl.innerHTML = combined || '<div class="empty">Nothing here</div>';
  // Inject delegated panel after DOM is written
  renderDelegated();
  renderRemission();
  renderArchiveBucket();
  renderReflection();
  renderSnoozedPanel();
}

function deadlineHTML(item) {
  if (!item.deadline || item.cleared) return '';
  const dl = new Date(item.deadline);
  if (isNaN(dl)) return '';
  const now = new Date();
  const days = Math.round((dl - now) / 86400000);
  let cls, label;
  if (days < 0)      { cls = 'deadline-overdue'; label = Math.abs(days) + 'd overdue'; }
  else if (days <= 3){ cls = 'deadline-soon';    label = days === 0 ? 'due today' : 'due in ' + days + 'd'; }
  else               { cls = 'deadline-ok';      label = 'due ' + dl.toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
  return `<span class="deadline-tag ${cls}">${label}</span>`;
}

// ── Pomodoro ──────────────────────────────────────────────
let pomoSecs = 15*60, pomoRunning = false, pomoInterval = null, pomoDuration = 15;
let pomoCollapsed = false;

// ── Focus tracking ───────────────────────────────────────
// Sessions stored as array of {mins, duration} per day
function todayKey()    { return 'focusSessions_' + new Date().toISOString().slice(0,10); }
function getSessions() { try { return JSON.parse(localStorage.getItem(todayKey()) || '[]'); } catch(e) { return []; } }

// Called when a timer completes or is paused — records actual elapsed minutes
let sessionStartSecs = null; // tracks seconds at last session start

function startFocusSession() {
  sessionStartSecs = pomoSecs;
}
function endFocusSession() {
  if (sessionStartSecs === null) return;
  const elapsedSecs = sessionStartSecs - pomoSecs;
  const elapsed = elapsedSecs >= 30 ? Math.max(1, Math.round(elapsedSecs / 60)) : 0; // save if at least 30 seconds
  if (elapsed > 0) {
    const session = { id: Date.now(), mins: elapsed, duration: pomoDuration };
    const sessions = getSessions();
    sessions.push(session);
    localStorage.setItem(todayKey(), JSON.stringify(sessions));
    updateFocusDisplay();
    saveFocusSessionToSheet(session);
  }
  sessionStartSecs = null;
}

function togglePomoCollapse() {
  pomoCollapsed = !pomoCollapsed;
  const bar = document.getElementById('pomo-bar-container');
  if (bar) bar.classList.toggle('collapsed', pomoCollapsed);
  const btn = document.getElementById('pomo-collapse-btn');
  if (btn) btn.textContent = pomoCollapsed ? '▸ Focus' : '▾ Focus';
}

function resetFocusDay() {
  localStorage.removeItem(todayKey());
  localStorage.setItem('focusResetAt', Date.now().toString());
  updateFocusDisplay();
}

function updateFocusDisplay() {
  const sessions = getSessions();
  const totalMins = sessions.reduce((s, x) => s + x.mins, 0);

  // Label
  const h = Math.floor(totalMins / 60), m = totalMins % 60;
  const focusLabel = (h > 0 ? h + 'h ' : '') + m + 'm focus today';
  document.getElementById('focus-total-display').textContent = focusLabel;
  // Also update collapsed summary
  const summary = document.getElementById('pomo-focus-summary');
  if (summary) summary.textContent = totalMins > 0 ? focusLabel : '';

  // 10 boxes × 30 min = 5 hrs max — each box fills incrementally
  const BOXES = 10;
  const MINS_PER_BOX = 30;
  const boxesEl = document.getElementById('focus-boxes');
  let bhtml = '';
  for (let i = 0; i < BOXES; i++) {
    const boxStart = i * MINS_PER_BOX;
    const boxEnd   = boxStart + MINS_PER_BOX;
    if (totalMins >= boxEnd) {
      // fully filled
      bhtml += `<div class="focus-box" style="background:#3A9E6C;border-color:#3A9E6C" title="${boxEnd}min"></div>`;
    } else if (totalMins > boxStart) {
      // partially filled — show fill % as gradient
      const pct = Math.round(((totalMins - boxStart) / MINS_PER_BOX) * 100);
      bhtml += `<div class="focus-box" style="background:linear-gradient(to right,#3A9E6C ${pct}%,var(--bg3) ${pct}%);border-color:var(--border)" title="${totalMins - boxStart}/${MINS_PER_BOX}min"></div>`;
    } else {
      // empty
      bhtml += `<div class="focus-box" title="${boxEnd}min"></div>`;
    }
  }
  boxesEl.innerHTML = bhtml;
}

function setDuration(min) {
  if (pomoRunning) return;
  pomoDuration = min;
  pomoSecs = min * 60;
  document.querySelectorAll('.pomo-preset').forEach(b => b.classList.toggle('active', b.textContent.trim().startsWith(String(min))));
  updatePomoDisplay();
  updatePomoBar();
}
// Prevent accidental preset changes — lock active preset display while running
function syncPresetDisplay() {
  document.querySelectorAll('.pomo-preset').forEach(b => {
    b.classList.toggle('active', b.textContent.trim().startsWith(String(pomoDuration)));
  });
}
function pomoToggle() {
  if (pomoRunning) {
    clearInterval(pomoInterval);
    pomoRunning = false;
    endFocusSession();
    document.getElementById('pomo-start').textContent = 'Start';
    document.getElementById('pomo-status').textContent = 'Paused';
  } else {
    if (pomoSecs <= 0) pomoSecs = pomoDuration * 60;
    pomoRunning = true;
    startFocusSession();
    syncPresetDisplay();
    document.getElementById('pomo-start').textContent = 'Pause';
    document.getElementById('pomo-status').textContent = 'Running';
    pomoInterval = setInterval(() => {
      pomoSecs--;
      updatePomoDisplay();
      updatePomoBar();
      if (pomoSecs <= 0) {
        clearInterval(pomoInterval);
        pomoRunning = false;
        endFocusSession();
        document.getElementById('pomo-start').textContent = 'Start';
        document.getElementById('pomo-status').textContent = 'Done! 🎉';
      }
    }, 1000);
  }
}
function pomoReset() {
  clearInterval(pomoInterval);
  if (pomoRunning) endFocusSession(); // save any accumulated time before reset
  pomoRunning = false;
  pomoSecs = pomoDuration * 60;
  document.getElementById('pomo-start').textContent = 'Start';
  document.getElementById('pomo-status').textContent = 'Ready';
  updatePomoDisplay();
  updatePomoBar();
}
function updatePomoDisplay() {
  const m = Math.floor(pomoSecs/60), s = pomoSecs%60;
  document.getElementById('pomo-display').textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}
function updatePomoBar() {
  const pct = (pomoSecs / (pomoDuration * 60)) * 100;
  const bar = document.getElementById('pomo-bar');
  bar.style.width = pct + '%';
  bar.style.background = '#3A9E6C';
}

// Energy cycling: 0=neutral(gray) 1=risk(red) 2=energizing(green) 3=draining(amber)
// stored as cat string matching item cats: '3'=neutral,'1'=risk,'2'=enrg,'4'=drain
const O_CAT_CYCLE = ['3','1','2','4'];
const O_CAT_DOT   = { '1':'e1','2':'e2','3':'e3','4':'e4' };
const O_CAT_ACC   = { '1':'acc-risk','2':'acc-enrg','3':'acc-neut','4':'acc-drai' };
const O_PRI_BADGE = { '0':{ badge:'!!', cls:'pri-top' }, '1':{ badge:'!', cls:'pri-high' }, '2':{ badge:'', cls:'' }, '3':{ badge:'↓', cls:'pri-low' } };

function normalizeOutreach(r) {
  return {
    id:       Number(r.id),
    name:     r.name || '',
    type:     r.type || 'call',
    cat:      String(r.cat || '3'),
    pri:      String(r.pri != null && r.pri !== '' ? r.pri : '2'),
    starred:  r.starred === true || String(r.starred).toUpperCase() === 'TRUE',
    done:     r.done === true || String(r.done).toUpperCase() === 'TRUE',
    archived:   r.archived  === true || String(r.archived).toUpperCase()  === 'TRUE',
    archivedAt: r.archivedAt || '',
    added:    (r.added || '').slice(0,10),
    lastPinged:   r.lastPinged   || '',
    snoozedUntil: /\d{4}-\d{2}-\d{2}/.test(r.snoozedUntil || '') ? r.snoozedUntil.slice(0,10) : '',
    revenue:      r.revenue === true || String(r.revenue).toUpperCase() === 'TRUE',
  };
}

async function loadOutreach() {
  if (!scriptUrl) return;
  try {
    const res = await fetch(scriptUrl + '?action=getOutreach');
    if (!res.ok) return;
    const data = await res.json();
    const arr = Array.isArray(data) ? data : (data.items || []);
    const allOutreach = arr.map(normalizeOutreach);
    outreachItems = allOutreach.filter(o => !o.archived);
    archivedOutreachItems = allOutreach.filter(o => o.archived);
    autoStarUnsnoozedOutreach();
    localStorage.setItem('outreachCache', JSON.stringify(outreachItems));
    renderOutreach();
    render(); // ensure Today view picks up starred outreach on load
  } catch(e) {
    const cached = localStorage.getItem('outreachCache');
    if (cached) { outreachItems = JSON.parse(cached); renderOutreach(); }
  }
}

async function outreachPost(payload) {
  try {
    await fetch(scriptUrl, { method: 'POST', body: JSON.stringify(payload) });
    localStorage.setItem('outreachCache', JSON.stringify(outreachItems));
  } catch(e) {
    localStorage.setItem('outreachCache', JSON.stringify(outreachItems));
  }
}

async function addOutreach() {
  const raw = document.getElementById('o-name').value.trim();
  if (!raw) return;
  const type = document.getElementById('o-type').value;
  const names = raw.split(/[,\u000a]+/).map(s => s.trim()).filter(Boolean);
  // Dupe check
  const existing = outreachItems.map(o => o.name.toLowerCase());
  const dupes = names.filter(n => existing.includes(n.toLowerCase()));
  if (dupes.length) {
    const msg = dupes.length === 1
      ? '"' + dupes[0] + '" is already in your contacts. Add anyway?'
      : dupes.join(', ') + ' are already in your contacts. Add anyway?';
    if (!confirm(msg)) return;
  }
  // Disable Add button briefly
  const addBtn = document.querySelector('.outreach-add button');
  if (addBtn) { addBtn.disabled = true; addBtn.textContent = 'Adding…'; }
  for (const name of names) {
    const item = { id: Date.now() + Math.random(), name, type, cat:'3', pri:'2', starred:outreachAddStarred, done:false, archived:false, added: new Date().toISOString().slice(0,10) };
    item.id = Math.floor(item.id);
    outreachItems.unshift(item);
    await outreachPost({ action: 'addOutreach', item });
  }
  document.getElementById('o-name').value = '';
  outreachAddStarred = false;
  toggleOutreachAddStar();
  const addBtn2 = document.querySelector('.outreach-add button');
  if (addBtn2) { addBtn2.disabled = false; addBtn2.textContent = 'Add'; }
  flashBtn(addBtn2);
  renderOutreach();
}

async function pingOutreach(id, e) {
  e.stopPropagation();
  const o = outreachItems.find(x => x.id === id);
  if (!o) return;
  const btn = e.target.closest('.ping-btn');
  if (!btn) return;

  // Show "Just now" + "Pick date" options
  const wrap = document.createElement('span');
  wrap.style.cssText = 'display:inline-flex;gap:4px;align-items:center';
  const nowBtn = document.createElement('button');
  nowBtn.className = 'ping-btn';
  nowBtn.style.cssText = 'background:#3A9E6C;color:#fff;border-color:#3A9E6C';
  nowBtn.textContent = '✓ Just now';
  const dateBtn = document.createElement('button');
  dateBtn.className = 'ping-btn';
  dateBtn.textContent = 'Pick date';
  wrap.appendChild(nowBtn);
  wrap.appendChild(dateBtn);
  btn.replaceWith(wrap);

  // Just now
  nowBtn.addEventListener('click', async function(ev) {
    ev.stopPropagation();
    o.lastPinged = new Date().toISOString();
    flashBtn(nowBtn);
    await outreachPost({ action: 'updateOutreach', item: o });
    renderOutreach();
  });

  // Pick date — replace with datetime input
  dateBtn.addEventListener('click', function(ev) {
    ev.stopPropagation();
    const now = new Date();
    const localNow = new Date(now.getTime() - now.getTimezoneOffset()*60000).toISOString().slice(0,16);
    const input = document.createElement('input');
    input.type = 'datetime-local';
    input.className = 'ping-date-input';
    input.style.width = '160px';
    input.value = localNow;
    input.max = localNow;
    wrap.replaceWith(input);
    input.focus();
    async function confirmPing() {
      const val = input.value;
      if (val) {
        o.lastPinged = new Date(val).toISOString();
        await outreachPost({ action: 'updateOutreach', item: o });
      }
      renderOutreach();
    }
    input.addEventListener('change', confirmPing);
    input.addEventListener('blur', () => { renderOutreach(); });
    input.addEventListener('keydown', ev2 => {
      if (ev2.key === 'Enter') { ev2.preventDefault(); confirmPing(); }
      if (ev2.key === 'Escape') { renderOutreach(); }
      ev2.stopPropagation();
    });
  });
}

async function setPingDate(id, e) {
  e.stopPropagation();

  const o = outreachItems.find(x => x.id === id);

  const span = e.target.closest('.ping-ago');
  if (!span) return;
  const now2 = new Date();
  const localNow2 = new Date(now2.getTime() - now2.getTimezoneOffset()*60000).toISOString().slice(0,16);
  const current = o.lastPinged
    ? new Date(new Date(o.lastPinged).getTime() - now2.getTimezoneOffset()*60000).toISOString().slice(0,16)
    : localNow2;
  const input = document.createElement('input');
  input.type = 'datetime-local';
  input.className = 'ping-date-input';
  input.style.width = '160px';
  input.value = current;
  input.max = localNow2;
  span.replaceWith(input);
  input.focus();

  async function confirmPing() {
    const val = input.value;
    if (val) {
      o.lastPinged = new Date(val).toISOString();
      await outreachPost({ action: 'updateOutreach', item: o });
    }
    renderOutreach();
  }
  input.addEventListener('change', confirmPing);
  input.addEventListener('blur', () => { renderOutreach(); });
  input.addEventListener('keydown', ev => {
    if (ev.key === 'Enter') { ev.preventDefault(); confirmPing(); }
    if (ev.key === 'Escape') { renderOutreach(); }
    ev.stopPropagation();
  });
}

function formatPingAgo(ts) {
  if (!ts) return '';
  const diff = Date.now() - new Date(ts).getTime();
  const mins  = Math.floor(diff / 60000);
  const hours = Math.floor(diff / 3600000);
  const days  = Math.floor(diff / 86400000);
  if (mins < 1)   return 'just now';
  if (mins < 60)  return mins + 'm ago';
  if (hours < 24) return hours + 'h ago';
  return days + 'd ago';
}

function autoStarUnsnoozedOutreach() {
  const now = new Date();
  outreachItems.forEach(o => {
    if (o.snoozedUntil && new Date(o.snoozedUntil) <= now) {
      o.snoozedUntil = '';
      o.starred = true;
      outreachPost({ action: 'updateOutreach', item: o });
    }
  });
}

async function snoozeOutreach(id, e) {
  e.stopPropagation();
  const o = outreachItems.find(x => x.id === id);
  if (!o) return;
  const btn = e.target.closest('.snooze-btn');
  if (!btn) return;

  // If already snoozed, clear it
  if (o.snoozedUntil && new Date(o.snoozedUntil) > new Date()) {
    o.snoozedUntil = '';
    await outreachPost({ action: 'updateOutreach', item: o });
    renderOutreach();
    return;
  }

  // Show date picker
  const today = new Date().toISOString().slice(0,10);
  const input = document.createElement('input');
  input.type = 'date';
  input.className = 'ping-date-input';
  input.style.width = '120px';
  input.min = today;
  btn.replaceWith(input);
  input.focus();

  let snoozeDone = false;
  async function confirmSnooze() {
    if (snoozeDone) return;
    snoozeDone = true;
    const val = input.value;
    if (val) {
      o.snoozedUntil = val;
      await outreachPost({ action: 'updateOutreach', item: o });
    }
    renderOutreach();
  }
  input.addEventListener('change', confirmSnooze);
  input.addEventListener('blur', () => { setTimeout(confirmSnooze, 50); });
  input.addEventListener('keydown', ev => {
    if (ev.key === 'Enter') { ev.preventDefault(); confirmSnooze(); }
    if (ev.key === 'Escape') { snoozeDone = true; renderOutreach(); }
    ev.stopPropagation();
  });
}

function editOutreachName(id, e) {
  e.stopPropagation();
  const o = outreachItems.find(x => x.id === id);

  const span = document.getElementById('oname-' + id);
  if (!span) return;
  const input = document.createElement('input');
  input.className = 'outreach-name-input';
  input.value = o.name;
  span.replaceWith(input);
  input.focus();
  input.select();
  async function save() {
    const val = input.value.trim();
    if (val) o.name = val;
    renderOutreach();
    if (val) await outreachPost({ action: 'updateOutreach', item: o });
  }
  input.addEventListener('blur', save);
  input.addEventListener('keydown', function(ev) {
    if (ev.key === 'Enter') { ev.preventDefault(); input.blur(); }
    if (ev.key === 'Escape') { o.name = o.name; renderOutreach(); }
    ev.stopPropagation();
  });
}

function renderOutreach() {
  const active = outreachItems.filter(o => !o.done);
  const done   = outreachItems.filter(o => o.done);
  // In Today view, only show starred outreach in the panel
  const todayActive = activePills.has('starred');
  const nowTs = new Date();
  const vis = outreachItems.filter(o => {
    if (todayActive && !o.done && !o.starred) return false;
    if (outreachTypeFilter !== 'all' && o.type !== outreachTypeFilter) return false;
    // Hide snoozed contacts (unless searching)
    if (o.snoozedUntil && !searchQuery && new Date(o.snoozedUntil) > nowTs) return false;
    // Search filter
    if (searchQuery && !o.name.toLowerCase().includes(searchQuery)) return false;
    // Revenue filter
    if (activePills.has('revenue') && !o.revenue) return false;
    return true;
  });

  // Count badge — reflects current filter (Today or type)
  const todayCount = activePills.has('starred')
    ? vis.filter(o => !o.done).length
    : active.filter(o => outreachTypeFilter === 'all' || o.type === outreachTypeFilter).length;
  document.getElementById('outreach-count').textContent = todayCount + ' remaining';

  // Done footer
  const doneCount = done.filter(o => outreachTypeFilter === 'all' || o.type === outreachTypeFilter).length;

  // Sort: alpha or priority
  const sorted = [...vis].sort((a, b) => {
    if (outreachSortMode === 'alpha') {
      if (a.done !== b.done) return a.done ? 1 : -1;
      return a.name.localeCompare(b.name);
    }
    if (a.done !== b.done) return a.done ? 1 : -1;
    if (a.starred !== b.starred) return a.starred ? -1 : 1;
    return parseInt(a.pri||'2') - parseInt(b.pri||'2');
  });

  if (!sorted.length) {
    document.getElementById('outreach-list').innerHTML = '<div class="outreach-empty">No outreach yet — add names above</div>';
    return;
  }

  // Pagination — show 15 at a time
  const PAGE_SIZE = 10;
  if (typeof window._outreachPage === 'undefined') window._outreachPage = 0;
  const totalPages = Math.ceil(sorted.length / PAGE_SIZE);
  const page = Math.min(window._outreachPage, totalPages - 1);
  const paged = sorted.slice(page * PAGE_SIZE, (page + 1) * PAGE_SIZE);

  document.getElementById('outreach-list').innerHTML = paged.map(o => {
    const pri = o.pri || '2';
    const pb  = O_PRI_BADGE[pri];
    const priBadge = pb && pb.badge ? `<span class="outreach-pri-badge ${pb.cls}">${pb.badge}</span>` : '';
    const upActive   = parseInt(pri) < 2 ? 'active' : '';
    const downActive = parseInt(pri) > 2 ? 'active' : '';
    const dotCls = O_CAT_DOT[o.cat] || 'e3';
    const typeIcon = o.type === 'email' ? 'ti-mail' : o.type === 'linkedin' ? 'ti-brand-linkedin' : 'ti-phone';
    const typeTitle = o.type === 'email' ? 'Email' : o.type === 'linkedin' ? 'LinkedIn' : 'Call';
    // Always reserve badge space for alignment — blank for normal priority
    const priBadgeOrSpace = pb && pb.badge
      ? `<span class="outreach-pri-badge ${pb.cls}" style="min-width:22px;text-align:center">${pb.badge}</span>`
      : `<span style="display:inline-block;min-width:22px"></span>`;
    return `<div class="outreach-row">
      <div class="outreach-row-top">
        <div class="outreach-chk ${o.done ? 'done' : ''}" onclick="toggleOutreachDone(${o.id}, event)">
          ${o.done ? '<i class="ti ti-check"></i>' : ''}
        </div>
        <div class="e-dot ${dotCls}" onclick="cycleOutreachCat(${o.id}, event)" title="Tap to set energy type"></div>
        <i class="ti ${typeIcon} outreach-icon" onclick="cycleOutreachType(${o.id}, event)" style="cursor:pointer" title="Tap to change type (${typeTitle})" aria-hidden="true"></i>
        <div class="outreach-name-wrap" style="flex:1;min-width:0;overflow:hidden">
          <span class="outreach-name ${o.done ? 'done' : ''}" id="oname-${o.id}" onclick="editOutreachName(${o.id}, event)" title="Tap to edit" style="display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${o.name}${o.revenue ? ' <span class=\"rev-badge\" title=\"Revenue contact\">$</span>' : ''}</span>
          ${o.lastPinged ? `<span class="ping-ago" onclick="setPingDate(${o.id}, event)" title="Tap to change date" style="display:block;margin-top:1px">${formatPingAgo(o.lastPinged)}</span>` : ''}
          ${o.snoozedUntil && new Date(o.snoozedUntil) > new Date() ? `<span style="font-size:11px;color:#185FA5;display:block;margin-top:1px">💤 until ${new Date(o.snoozedUntil).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>` : ''}
        </div>
        <button class="outreach-del" onclick="deleteOutreach(${o.id}, event)" aria-label="Remove"><i class="ti ti-x"></i></button>
      </div>
      <div class="outreach-row-bottom">
        <button class="ping-btn" onclick="pingOutreach(${o.id}, event)" title="Log a ping">ping</button>
        <button class="snooze-btn" onclick="snoozeOutreach(${o.id}, event)" title="Snooze contact">💤</button>
        <button class="rev-btn ${o.revenue ? 'on' : ''}" onclick="toggleOutreachRevenue(${o.id}, event)" title="${o.revenue ? 'Revenue contact' : 'Mark as revenue'}">$</button>
        ${priBadgeOrSpace}
        <button class="outreach-star ${o.starred ? 'on' : ''}" onclick="toggleOutreachStar(${o.id}, event)" title="Star for today">★</button>
        <div class="outreach-pri-btns">
          <button class="outreach-pri-btn ${upActive}"   onclick="changeOutreachPri(${o.id},'up',event)">▲</button>
          <button class="outreach-pri-btn ${downActive}" onclick="changeOutreachPri(${o.id},'down',event)" style="font-size:11px">▽</button>
        </div>
      </div>
    </div>`;
  }).join('');

  // Pagination controls
  const pgEl = document.getElementById('outreach-pagination');
  if (pgEl) {
    if (totalPages > 1) {
      pgEl.style.display = 'flex';
      pgEl.innerHTML = '<span style="font-size:12px;color:var(--text2)">' + (page * PAGE_SIZE + 1) + '–' + Math.min((page+1)*PAGE_SIZE, sorted.length) + ' of ' + sorted.length + '</span>'
        + (page > 0 ? '<button class="snooze-btn" onclick="window._outreachPage='+page+'-1;renderOutreach()">← Prev</button>' : '')
        + (page < totalPages-1 ? '<button class="snooze-btn" onclick="window._outreachPage='+page+'+1;renderOutreach()">Next →</button>' : '');
    } else {
      pgEl.style.display = 'none';
    }
  }

  // Also re-render task list so Today filter picks up outreach stars
  if (activePills.has('starred') || activePills.has('prioritized')) render();
  renderSnoozedPanel();
  renderArchivedOutreachPanel();
}

// Return outreach items visible in current task filter (for Today / Prioritized views)
function visibleOutreach() {
  const star = activePills.has('starred');
  const pri  = activePills.has('prioritized');
  if (!star && !pri && !catFilter) return [];
  return outreachItems.filter(o => {
    if (o.done) return false;
    if (catFilter && o.cat !== catFilter) return false;
    // In Today view, only show starred outreach
    if (star && !o.starred) return false;
    // In Prioritized view, only show high/top priority outreach
    if (pri && !star && parseInt(o.pri||'2') >= 2) return false;
    return true;
  });
}

function autoCheckDelegations() {
  const now = new Date();
  let changed = false;
  items.forEach(i => {
    if (!i.delegated) return;
    const shouldRecall = !i.delegationExpiry || new Date(i.delegationExpiry + 'T12:00:00') <= now;
    if (shouldRecall) {
      i.delegated = false;
      i.starred   = true;
      i.pri       = '1';
      changed     = true;
      apiPost({ action: 'update', item: i });
    }
  });
  if (changed) render();
}

function delegatedPanelHTML() {
  const delegatedItems = items.filter(i => i.delegated && !i.archived && !i.cleared);
  const isCollapsed = delegatedCollapsed;

  if (!delegatedItems.length) {
    return '<div class="delegated-panel collapsed" id="delegated-panel-inline">'
      + '<div class="delegated-hdr" onclick="toggleDelegated()">'
      + '<div class="delegated-hdr-title"><i class="ti ti-user-check" style="font-size:14px"></i> Delegated <span class="delegated-count">0</span></div>'
      + '<i class="ti ti-chevron-down delegated-chevron"></i></div></div>';
  }
  const rows = delegatedItems.map(i => {
    const expiry = i.delegationExpiry ? new Date(i.delegationExpiry + 'T12:00:00') : null;
    const daysLeft = expiry ? Math.ceil((expiry - new Date()) / 86400000) : null;
    let expiryText = '';
    if (expiry) {
      if (daysLeft < 0)        expiryText = ' · overdue';
      else if (daysLeft === 0) expiryText = ' · check back today';
      else                     expiryText = ' · ↩ ' + expiry.toLocaleDateString('en-US',{month:'short',day:'numeric'});
    }
    const delegationLine = (i.delegatedTo ? '→ ' + i.delegatedTo : '') + expiryText;
    // Modify the item to show delegation info in its meta
    const augmented = Object.assign({}, i, { _delegationLine: delegationLine });
    const recall = '<button class="delegated-recall" onclick="event.stopPropagation();recallDelegated(' + i.id + ')">↑ Recall</button>';
    const footer = '<div style="padding:2px 12px 8px;font-size:11px;color:#185FA5;display:flex;justify-content:space-between;align-items:center">'
      + '<span>' + delegationLine + '</span>' + recall + '</div>';
    return itemHTML(i) + footer;
  }).join('');

  return `<div class="delegated-panel ${isCollapsed ? 'collapsed' : ''}" id="delegated-panel-inline" onclick="if(event.target===this||event.target.closest('.delegated-hdr'))toggleDelegated()">
    <div class="delegated-hdr">
      <div class="delegated-hdr-title">
        <i class="ti ti-user-check" style="font-size:14px" aria-hidden="true"></i>
        Delegated
        <span class="delegated-count">${delegatedItems.length}</span>
      </div>
      <i class="ti ti-chevron-down delegated-chevron" aria-hidden="true"></i>
    </div>
    <div class="delegated-body">${rows}</div>
  </div>`;
}

function renderDelegated() {
  // Inline anchor (between risk and energizing in the list)
  const anchor = document.getElementById('delegated-anchor');
  if (anchor) anchor.outerHTML = delegatedPanelHTML();
  // Bottom persistent panel
  const bottom = document.getElementById('delegated-bottom-bucket');
  if (bottom) bottom.innerHTML = delegatedPanelHTML().replace('id="delegated-panel-inline"', 'id="delegated-panel-bottom"');
}

function toggleDelegated() {
  delegatedCollapsed = !delegatedCollapsed;
  const p = document.getElementById('delegated-panel-inline');
  if (p) p.classList.toggle('collapsed', delegatedCollapsed);
}

// ── Errands ──────────────────────────────────────────────
let errandsItems = [];
let errandsTypeFilter = 'all';

function setErrandsType(type) {
  errandsTypeFilter = type;
  document.querySelectorAll('.errands-type-btn').forEach(b => b.classList.toggle('active', b.dataset.type === type));
  renderErrands();
}

async function cycleErrandType(id, e) {
  e.stopPropagation();
  const o = errandsItems.find(x => x.id === id);
  if (!o) return;
  o.type = o.type === 'errand' ? 'shopping' : 'errand';
  renderErrands();
  await errandsPost({ action: 'updateErrand', item: o });
}
let errandsCollapsed = false;

function normalizeErrand(r) {
  return {
    id:       Number(r.id),
    name:     r.name || '',
    pri:      String(r.pri != null && r.pri !== '' ? r.pri : '2'),
    starred:  r.starred === true || String(r.starred).toUpperCase() === 'TRUE',
    done:     r.done    === true || String(r.done).toUpperCase()    === 'TRUE',
    archived:   r.archived  === true || String(r.archived).toUpperCase()  === 'TRUE',
    archivedAt: r.archivedAt || '',
    added:    (r.added || '').slice(0,10),
    type:     r.type || 'errand',
    note:     r.note || '',
  };
}

async function loadErrands() {
  if (!scriptUrl) return;
  try {
    const res = await fetch(scriptUrl + '?action=getErrands');
    if (!res.ok) return;
    const data = await res.json();
    const arr = Array.isArray(data) ? data : (data.items || []);
    errandsItems = arr.map(normalizeErrand).filter(e => !e.archived);
    localStorage.setItem('errandsCache', JSON.stringify(errandsItems));
    renderErrands();
  } catch(err) {
    const cached = localStorage.getItem('errandsCache');
    if (cached) { errandsItems = JSON.parse(cached); renderErrands(); }
  }
}

async function errandsPost(payload) {
  try {
    await fetch(scriptUrl, { method: 'POST', body: JSON.stringify(payload) });
    localStorage.setItem('errandsCache', JSON.stringify(errandsItems));
  } catch(e) {
    localStorage.setItem('errandsCache', JSON.stringify(errandsItems));
  }
}

function toggleErrands() {
  errandsCollapsed = !errandsCollapsed;
  document.getElementById('errands-panel').classList.toggle('collapsed', errandsCollapsed);
}

async function addErrands() {
  const raw = document.getElementById('e-name').value.trim();
  if (!raw) return;
  const names = raw.split(/[,\u000a]+/).map(s => s.trim()).filter(Boolean);
  for (const name of names) {
    const etype = document.getElementById('e-type') ? document.getElementById('e-type').value : 'errand';
    const item = { id: Math.floor(Date.now() + Math.random()*1000), name, pri:'2', starred:false, done:false, archived:false, added: new Date().toISOString().slice(0,10), type: etype, note: '' };
    errandsItems.unshift(item);
    await errandsPost({ action: 'addErrand', item });
  }
  document.getElementById('e-name').value = '';
  renderErrands();
}

async function toggleErrandDone(id, e) {
  e.stopPropagation();
  const o = errandsItems.find(x => x.id === id);
  if (!o) return;
  o.done = !o.done;
  renderErrands();
  await errandsPost({ action: 'updateErrand', item: o });
}

async function toggleErrandStar(id, e) {
  e.stopPropagation();
  const o = errandsItems.find(x => x.id === id);
  if (!o) return;
  o.starred = !o.starred;
  renderErrands();
  await errandsPost({ action: 'updateErrand', item: o });
}

async function changeErrandPri(id, dir, e) {
  e.stopPropagation();
  const o = errandsItems.find(x => x.id === id);
  if (!o) return;
  const cur = parseInt(o.pri || '2');
  o.pri = dir === 'up' ? String(Math.max(0, cur-1)) : String(Math.min(3, cur+1));
  renderErrands();
  await errandsPost({ action: 'updateErrand', item: o });
}

async function deleteErrand(id, e) {
  e.stopPropagation();
  errandsItems = errandsItems.filter(x => x.id !== id);
  renderErrands();
  await errandsPost({ action: 'deleteErrand', id });
}

async function archiveErrands() {
  const toArchive = errandsItems.filter(o => o.done);
  toArchive.forEach(o => { o.archived = true; });
  errandsItems = errandsItems.filter(o => !o.done);
  renderErrands();
  for (const o of toArchive) await errandsPost({ action: 'updateErrand', item: o });
}

function editErrandName(id, e) {
  e.stopPropagation();
  const o = errandsItems.find(x => x.id === id);
  if (!o || o.done) return;
  const span = document.getElementById('ename-' + id);
  if (!span) return;
  const input = document.createElement('input');
  input.className = 'errands-name-input';
  input.value = o.name;
  span.replaceWith(input);
  input.focus(); input.select();
  async function save() {
    const val = input.value.trim();
    if (val) o.name = val;
    renderErrands();
    if (val) await errandsPost({ action: 'updateErrand', item: o });
  }
  input.addEventListener('blur', save);
  input.addEventListener('keydown', function(ev) {
    if (ev.key === 'Enter') { ev.preventDefault(); input.blur(); }
    if (ev.key === 'Escape') { renderErrands(); }
    ev.stopPropagation();
  });
}

function renderErrands() {
  if (!offClock) return;
  const active = errandsItems.filter(o => !o.done);
  const done   = errandsItems.filter(o => o.done);

  document.getElementById('errands-count').textContent = active.length + ' remaining';
  document.getElementById('errands-done-count').textContent = done.length > 0 ? done.length + ' done today' : '';
  document.getElementById('errands-archive-btn').style.display = done.length > 0 ? 'inline-block' : 'none';

  const todayActive = activePills.has('starred');
  const vis = errandsItems.filter(o => {
    if (errandsTypeFilter !== 'all' && o.type !== errandsTypeFilter) return false;
    if (todayActive && !o.starred) return false;
    return true;
  });

  const sorted = [...vis].sort((a,b) => {
    if (a.done !== b.done) return a.done ? 1 : -1;
    if (a.starred !== b.starred) return a.starred ? -1 : 1;
    return parseInt(a.pri||'2') - parseInt(b.pri||'2');
  });

  if (!sorted.length) {
    document.getElementById('errands-list').innerHTML = '<div class="errands-empty">' + (errandsTypeFilter === 'all' ? 'No errands yet — add above' : 'No ' + errandsTypeFilter + ' items') + '</div>';
    return;
  }

  document.getElementById('errands-list').innerHTML = sorted.map(o => {
    const pri = o.pri || '2';
    const pb  = O_PRI_BADGE[pri];
    const priBadge = pb && pb.badge ? `<span class="outreach-pri-badge ${pb.cls}">${pb.badge}</span>` : '';
    const upActive   = parseInt(pri) < 2 ? 'active' : '';
    const downActive = parseInt(pri) > 2 ? 'active' : '';
    return `<div class="errands-row">
      <div class="errands-chk ${o.done ? 'done' : ''}" onclick="toggleErrandDone(${o.id}, event)">
        ${o.done ? '<i class="ti ti-check"></i>' : ''}
      </div>
      <span style="font-size:15px;flex-shrink:0;cursor:pointer;color:var(--text2)" onclick="cycleErrandType(${o.id}, event)" title="Tap to change type">
        <i class="${o.type === 'shopping' ? 'ti ti-shopping-cart' : 'ti ti-car'}"></i>
      </span>
      <div style="flex:1;min-width:0">
        <span class="errands-name ${o.done ? 'done' : ''}" id="ename-${o.id}" onclick="editErrandName(${o.id}, event)">${o.name}</span>
        ${o.note ? `<span style="display:block;font-size:11px;color:var(--text3)">${linkifyNote(o.note)}</span>` : ''}
      </div>
      ${priBadge}
      <button class="errands-star ${o.starred ? 'on' : ''}" onclick="toggleErrandStar(${o.id}, event)" title="Star for today">★</button>
      <div class="errands-pri-btns">
        <button class="errands-pri-btn ${upActive}"   onclick="changeErrandPri(${o.id},'up',event)">▲</button>
        <button class="errands-pri-btn ${downActive}" onclick="changeErrandPri(${o.id},'down',event)">▼</button>
      </div>
      <button class="errands-del" onclick="deleteErrand(${o.id}, event)" aria-label="Remove"><i class="ti ti-x"></i></button>
    </div>`;
  }).join('');
}

// ── Subtask actions ───────────────────────────────────────
function addSubtasks(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  const input = document.getElementById('subtask-input-' + id);
  if (!input) return;
  const raw = input.value.trim();
  if (!raw) return;
  const names = raw.split(/[,\u000a]+/).map(s => s.trim()).filter(Boolean);
  if (!item.subtasks) item.subtasks = [];
  names.forEach(name => {
    item.subtasks.push({ id: Math.floor(Date.now() + Math.random()*1000), name, done: false });
  });
  input.value = '';
  expandedId = id;
  render();
  apiPost({ action: 'update', item });
}

function toggleSubtask(itemId, subId) {
  const item = items.find(i => i.id === itemId);
  if (!item) return;
  const sub = item.subtasks.find(s => s.id === subId);
  if (!sub) return;
  sub.done = !sub.done;
  item.subtasks.sort((a,b) => (a.done ? 1 : 0) - (b.done ? 1 : 0));
  expandedId = itemId;
  render();
  apiPost({ action: 'update', item });
}

function deleteSubtask(itemId, subId) {
  const item = items.find(i => i.id === itemId);
  if (!item) return;
  item.subtasks = item.subtasks.filter(s => s.id !== subId);
  expandedId = itemId;
  render();
  apiPost({ action: 'update', item });
}

function updateNextRecurAt(id) {
  // When recurring type changes in edit panel, pre-fill nextRecurAt with default
  const sel = document.getElementById('edit-recurring-' + id);
  const inp = document.getElementById('edit-nextrec-' + id);
  if (!sel || !inp || inp.value) return; // don't overwrite if already set
  const freq = sel.value;
  if (!freq) return;
  const d = new Date();
  d.setHours(5, 0, 0, 0);
  const delay = freq === 'daily' ? 1 : freq === 'weekly' ? 7 : 30;
  d.setDate(d.getDate() + delay);
  const local = new Date(d.getTime() - d.getTimezoneOffset()*60000).toISOString().slice(0,16);
  inp.value = local;
}

function editSubtaskName(itemId, subId) {
  const item = items.find(i => i.id === itemId);
  if (!item) return;
  const sub = item.subtasks.find(s => s.id === subId);
  if (!sub || sub.done) return;
  const span = document.getElementById('stask-' + itemId + '-' + subId);
  if (!span) return;
  const input = document.createElement('input');
  input.style.cssText = 'font-size:13px;flex:1;padding:1px 6px;border-radius:4px;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text);width:100%';
  input.value = sub.name;
  span.replaceWith(input);
  input.focus(); input.select();
  async function save() {
    const val = input.value.trim();
    if (val) sub.name = val;
    expandedId = itemId;
    render();
    if (val) await apiPost({ action: 'update', item });
  }
  input.addEventListener('blur', save);
  input.addEventListener('keydown', ev => {
    if (ev.key === 'Enter') { ev.preventDefault(); input.blur(); }
    if (ev.key === 'Escape') { expandedId = itemId; render(); }
    ev.stopPropagation();
  });
}

function moveSubtask(itemId, subId, dir) {
  const item = items.find(i => i.id === itemId);
  if (!item) return;
  const idx = item.subtasks.findIndex(s => s.id === subId);
  if (idx === -1) return;
  const newIdx = dir === 'up' ? idx - 1 : idx + 1;
  if (newIdx < 0 || newIdx >= item.subtasks.length) return;
  const tmp = item.subtasks[idx];
  item.subtasks[idx] = item.subtasks[newIdx];
  item.subtasks[newIdx] = tmp;
  expandedId = itemId;
  render();
  apiPost({ action: 'update', item });
}

// ── Auto-star on unsnooze ─────────────────────────────────
function autoStarUnsnoozed() {
  const now = new Date();
  let changed = false;
  items.forEach(i => {
    if (i.snoozedUntil && new Date(i.snoozedUntil) <= now) {
      i.snoozedUntil = '';
      i.starred  = true;
      i.cleared  = false; // ensure recurring tasks come back active
      changed    = true;
      apiPost({ action: 'update', item: i });
    }
  });
  return changed;
}

// ── Snooze ────────────────────────────────────────────────
async function clearSnooze(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  item.snoozedUntil = '';
  expandedId = id;
  render();
  await apiPost({ action: 'update', item });
}

// ── Time estimates ────────────────────────────────────────
async function setEstimate(id, val) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  item.estimate = parseInt(val) || 0;
  updateLoadCounter();
  await apiPost({ action: 'update', item });
}

function updateLoadCounter() {
  const el = document.getElementById('load-counter');
  if (!el) return;
  if (offClock) { el.style.display = 'none'; return; }
  const starred = items.filter(i => i.starred && !i.cleared);
  const totalMins = starred.reduce((s, i) => s + (i.estimate || 30), 0);
  if (totalMins === 0) { el.style.display = 'none'; return; }
  const h = Math.floor(totalMins / 60), m = totalMins % 60;
  const label = (h > 0 ? h + 'h ' : '') + (m > 0 ? m + 'm' : '');
  el.textContent = '⏱ ' + label;
  el.style.display = 'flex';
  el.className = 'load-counter' + (totalMins > 360 ? ' heavy' : totalMins > 240 ? ' warn' : '');
}

// ── Snoozed panel ─────────────────────────────────────────
let snoozedCollapsed = true;

function toggleSnoozedPanel() {
  snoozedCollapsed = !snoozedCollapsed;
  const p = document.getElementById('snoozed-panel-el');
  if (p) p.classList.toggle('collapsed', snoozedCollapsed);
}

function renderSnoozedPanel() {
  const el = document.getElementById('snoozed-bucket');
  if (!el) return;
  const now = new Date();
  const snoozedTasks = items.filter(i => i.snoozedUntil && new Date(i.snoozedUntil) > now && !i.archived)
    .sort((a,b) => new Date(a.snoozedUntil) - new Date(b.snoozedUntil));
  const snoozedContacts = outreachItems.filter(o => o.snoozedUntil && new Date(o.snoozedUntil) > now && !o.archived)
    .sort((a,b) => new Date(a.snoozedUntil) - new Date(b.snoozedUntil));
  const total = snoozedTasks.length + snoozedContacts.length;
  if (!total) { el.innerHTML = ''; return; }

  const taskRows = snoozedTasks.map(i => {
    const label = new Date(i.snoozedUntil).toLocaleDateString('en-US', {month:'short', day:'numeric'});
    return '<div style="display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:var(--radius)">'
      + '<i class="ti ti-checkbox" style="font-size:13px;color:var(--text3);flex-shrink:0"></i>'
      + '<span style="flex:1;font-size:13px">' + i.name + '</span>'
      + '<span style="font-size:11px;color:#185FA5">💤 ' + label + '</span>'
      + '<button class="delegated-recall" onclick="clearItemSnooze(' + i.id + ')" style="border-color:#185FA5;color:#185FA5">↑ Wake</button>'
      + '</div>';
  }).join('');

  const contactRows = snoozedContacts.map(o => {
    const label = new Date(o.snoozedUntil).toLocaleDateString('en-US', {month:'short', day:'numeric'});
    return '<div style="display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:var(--radius)">'
      + '<i class="ti ti-user" style="font-size:13px;color:var(--text3);flex-shrink:0"></i>'
      + '<span style="flex:1;font-size:13px">' + o.name + '</span>'
      + '<span style="font-size:11px;color:#185FA5">💤 ' + label + '</span>'
      + '<button class="delegated-recall" onclick="clearContactSnooze(' + o.id + ')" style="border-color:#185FA5;color:#185FA5">↑ Wake</button>'
      + '</div>';
  }).join('');

  el.innerHTML = '<div class="snoozed-panel ' + (snoozedCollapsed ? 'collapsed' : '') + '" id="snoozed-panel-el">'
    + '<div class="snoozed-hdr" onclick="toggleSnoozedPanel()">'
    + '<div class="snoozed-hdr-title"><i class="ti ti-moon" style="font-size:13px"></i> Snoozed <span class="snoozed-count">' + total + '</span></div>'
    + '<i class="ti ti-chevron-down snoozed-chevron"></i></div>'
    + '<div class="snoozed-body">'
    + (snoozedTasks.length ? '<div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;padding:4px 8px 2px">Tasks</div>' + taskRows : '')
    + (snoozedContacts.length ? '<div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;padding:4px 8px 2px">Contacts</div>' + contactRows : '')
    + '</div></div>';
}

async function clearItemSnooze(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  item.snoozedUntil = '';
  item.starred  = true;
  item.cleared  = false;
  render();
  await apiPost({ action: 'update', item });
}

async function clearContactSnooze(id) {
  const o = outreachItems.find(x => x.id === id);
  if (!o) return;
  o.snoozedUntil = '';
  o.starred = true;
  renderOutreach();
  renderSnoozedPanel();
  await outreachPost({ action: 'updateOutreach', item: o });
}

// ── Linkify notes ─────────────────────────────────────────
function linkifyNote(text) {
  if (!text) return '';
  const urlRegex = /https?:\/\/[^\s<>"{}|\^`\[\]]+/g;
  return text.replace(urlRegex, function(url) {
    const display = url.length > 60 ? url.slice(0,57) + '...' : url;
    return '<a href="' + url + '" target="_blank" rel="noopener" style="color:#185FA5;word-break:break-all" onclick="event.stopPropagation()">' + display + '</a>';
  });
}

// ── Schedule to calendar ──────────────────────────────────
function scheduleTask(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  const now = new Date();
  now.setMinutes(0, 0, 0);
  now.setHours(now.getHours() + 1);
  const pad = n => String(n).padStart(2,'0');
  const fmt = d => d.getFullYear() + pad(d.getMonth()+1) + pad(d.getDate()) + 'T' + pad(d.getHours()) + pad(d.getMinutes()) + '00';
  const end = new Date(now.getTime() + 60*60*1000);
  const url = `https://calendar.google.com/calendar/r/eventedit?text=${encodeURIComponent(item.name)}&dates=${fmt(now)}/${fmt(end)}`;
  window.open(url, '_blank');
}

// ── Focus time sync ────────────────────────────────────────
async function saveFocusSessionToSheet(session) {
  if (!scriptUrl) return;
  try {
    await fetch(scriptUrl, { method: 'POST', body: JSON.stringify({ action: 'addFocusSession', session }) });
  } catch(e) { /* silent fail — local still saved */ }
}

async function loadFocusFromSheet() {
  if (!scriptUrl) return;
  try {
    const res = await fetch(scriptUrl + '?action=getFocusSessions');
    if (!res.ok) return;
    const data = await res.json();
    const arr = Array.isArray(data) ? data : [];
    if (!arr.length) return;
    // Filter out sessions saved before last reset
    const resetAt = parseInt(localStorage.getItem('focusResetAt') || '0');
    const filtered = arr.filter(s => Number(s.id) > resetAt);
    if (!filtered.length) return;
    const sheetMins = filtered.reduce((s, x) => s + Number(x.mins || 0), 0);
    const local = getSessions();
    const localMins = local.reduce((s, x) => s + Number(x.mins || 0), 0);
    if (sheetMins > localMins) {
      const normalized = filtered.map(s => ({ id: Number(s.id), mins: Number(s.mins), duration: Number(s.duration) }));
      localStorage.setItem(todayKey(), JSON.stringify(normalized));
      updateFocusDisplay();
    }
  } catch(e) { /* use local */ }
}

// ── Init ──────────────────────────────────────────────────
document.getElementById('f-name').addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });
document.getElementById('o-name').addEventListener('keydown', e => { if (e.key === 'Enter') addOutreach(); });
document.getElementById('e-name').addEventListener('keydown', e => { if (e.key === 'Enter') addErrands(); });
updateFocusDisplay();
// re-render focus bar after layout settles so widths are correct
setTimeout(updateFocusDisplay, 100);
applyClockMode();
loadItems();
loadOutreach();
loadErrands();
loadFocusFromSheet();
renderRemission();
</script>
